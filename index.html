  version: "1.0",
  currentZone: 1,

class SaveManager {
  constructor() {
    this.data = JSON.parse(JSON.stringify(DEFAULT_SAVE_DATA));
    this.load();
  }

  load() {
    try {
      const stored = localStorage.getItem('gravshift_save');
      if (stored) {
        const parsed = JSON.parse(stored);
        if (parsed.version === DEFAULT_SAVE_DATA.version) {
          this.data = parsed;
        } else {
          console.warn("Save file incompatible, starting new game.");
          this.save();
        }
      }
    } catch (e) {
      console.error("Failed to load save", e);
    }
  }

  save() {
    this.data.timestamp = Date.now();
    try {
      localStorage.setItem('gravshift_save', JSON.stringify(this.data));
    } catch (e) {
      console.error("Failed to save", e);
    }
  }

  resetProgress() {
    const settings = JSON.parse(JSON.stringify(this.data.settings));
    this.data = JSON.parse(JSON.stringify(DEFAULT_SAVE_DATA));
    this.data.settings = settings; // Keep settings
    this.save();
  }
}

class InputManager {
  constructor() {
    this.keys = {};
    this.prevKeys = {};
    this.mouse = { x: 0, y: 0, left: false, prevLeft: false };

    window.addEventListener('keydown', (e) => {
      this.keys[e.code] = true;
      if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
        e.preventDefault();
      }
    });

    window.addEventListener('keyup', (e) => {
      this.keys[e.code] = false;
    });

    const canvas = document.getElementById('gameCanvas');
    if(canvas) {
      canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        this.mouse.x = (e.clientX - rect.left) * scaleX;
        this.mouse.y = (e.clientY - rect.top) * scaleY;
      });
      canvas.addEventListener('mousedown', (e) => { if(e.button === 0) this.mouse.left = true; });
      canvas.addEventListener('mouseup', (e) => { if(e.button === 0) this.mouse.left = false; });
    }
  }

  update() {
    // Copy current state to prev state
    this.prevKeys = { ...this.keys };
    this.mouse.prevLeft = this.mouse.left;
  }

  isDown(code) { return !!this.keys[code]; }
  isJustPressed(code) { return !!this.keys[code] && !this.prevKeys[code]; }
  isJustReleased(code) { return !this.keys[code] && !!this.prevKeys[code]; }
  isMouseJustPressed() { return this.mouse.left && !this.mouse.prevLeft; }
}

class AudioEngine {
  constructor(saveData) {
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.masterGain = this.ctx.createGain();
    this.musicGain = this.ctx.createGain();
    this.sfxGain = this.ctx.createGain();

    this.sfxGain.connect(this.masterGain);
    this.musicGain.connect(this.masterGain);
    this.masterGain.connect(this.ctx.destination);

    this.settings = saveData.settings;
    this.updateVolumes();

    this.activeSfx = [];
    this.MAX_SFX = 8;
    this.musicOscillators = [];
  }

  updateVolumes() {
    this.masterGain.gain.value = this.settings.masterVolume / 100;
    this.musicGain.gain.value = this.settings.musicEnabled ? (this.settings.musicVolume / 100) : 0;
    this.sfxGain.gain.value = this.settings.sfxEnabled ? (this.settings.sfxVolume / 100) : 0;
  }

  resume() {
    if (this.ctx.state === 'suspended') {
      this.ctx.resume();
    }
  }

  _trackSfx(node) {
    this.activeSfx.push(node);
    if(this.activeSfx.length > this.MAX_SFX) {
      const oldest = this.activeSfx.shift();
      try { oldest.stop(); } catch(e){}
    }
    node.onended = () => {
      this.activeSfx = this.activeSfx.filter(n => n !== node);
    };
  }

  // --- SFX Functions ---
  sfx_gravityFlip() {
    if(!this.settings.sfxEnabled) return;
    const t = this.ctx.currentTime;
    const osc1 = this.ctx.createOscillator();
    const osc2 = this.ctx.createOscillator();
    const gain = this.ctx.createGain();

    osc1.frequency.setValueAtTime(180, t);
    osc1.frequency.linearRampToValueAtTime(440, t + 0.08);
    
    osc2.frequency.setValueAtTime(360, t);
    osc2.frequency.linearRampToValueAtTime(880, t + 0.08);
    osc2.type = 'sine';

    gain.gain.setValueAtTime(1.0, t);
    gain.gain.linearRampToValueAtTime(0.0, t + 0.2);

    osc1.connect(gain);
    osc2.connect(gain);
    gain.connect(this.sfxGain);

    osc1.start(t); osc1.stop(t + 0.2);
    osc2.start(t); osc2.stop(t + 0.2);
    this._trackSfx(osc1);
  }

  sfx_meleeSwing() {
    if(!this.settings.sfxEnabled) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = 150;

    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0.01, t);
    gain.gain.linearRampToValueAtTime(1.0, t + 0.005);
    gain.gain.linearRampToValueAtTime(0.0, t + 0.12);

    const filter = this.ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 800;
    filter.Q.value = 2;

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(this.sfxGain);
    
    osc.start(t); osc.stop(t + 0.12);
    this._trackSfx(osc);
  }

  sfx_meleeHit() {
    if(!this.settings.sfxEnabled) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    osc.type = 'square';
    osc.frequency.setValueAtTime(100, t);
    osc.frequency.linearRampToValueAtTime(60, t + 0.08);

    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(1.0, t);
    gain.gain.linearRampToValueAtTime(0.0, t + 0.15);

    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 400;

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(this.sfxGain);

    osc.start(t); osc.stop(t + 0.15);
    this._trackSfx(osc);
  }

  sfx_voidBolt() {
    if(!this.settings.sfxEnabled) return;
    const t = this.ctx.currentTime;
    const osc1 = this.ctx.createOscillator();
    const osc2 = this.ctx.createOscillator();
    const gain = this.ctx.createGain();

    osc1.frequency.value = 440;
    osc2.frequency.value = 446;

    gain.gain.setValueAtTime(0.3, t);
    gain.gain.linearRampToValueAtTime(0.0, t + 0.2);

    osc1.connect(gain);
    osc2.connect(gain);
    gain.connect(this.sfxGain);

    osc1.start(t); osc1.stop(t + 0.2);
    osc2.start(t); osc2.stop(t + 0.2);
    this._trackSfx(osc1);
  }

  sfx_chargedBlastCharge(startFreq, targetFreq, duration) {
    if(!this.settings.sfxEnabled) return;
    duration = duration/1000;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    osc.frequency.setValueAtTime(startFreq, t);
    osc.frequency.linearRampToValueAtTime(targetFreq, t + duration);

    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0.0, t);
    gain.gain.linearRampToValueAtTime(0.5, t + duration);

    osc.connect(gain);
    gain.connect(this.sfxGain);
    osc.start(t); osc.stop(t + duration);
    return { osc, gain }; // So we can stop it early if needed
  }

  sfx_chargedBlastFire() {
    if(!this.settings.sfxEnabled) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    osc.frequency.setValueAtTime(80, t);
    osc.frequency.linearRampToValueAtTime(40, t + 0.3);

    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(1.0, t);
    gain.gain.linearRampToValueAtTime(0.0, t + 0.3);
    
    osc.connect(gain);
    gain.connect(this.sfxGain);
    osc.start(t); osc.stop(t + 0.3);
    this._trackSfx(osc);
  }

  sfx_enemyAlert() {
    if(!this.settings.sfxEnabled) return;
    const t = this.ctx.currentTime;
    [0, 0.13].forEach(offset => {
      const osc = this.ctx.createOscillator();
      osc.type = 'square';
      osc.frequency.value = 880;
      const gain = this.ctx.createGain();
      gain.gain.setValueAtTime(0.6, t + offset);
      gain.gain.linearRampToValueAtTime(0.0, t + offset + 0.03);
      osc.connect(gain);
      gain.connect(this.sfxGain);
      osc.start(t + offset); osc.stop(t + offset + 0.03);
    });
  }

  sfx_enemyDeath() {
    if(!this.settings.sfxEnabled) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    osc.type = 'square';
    osc.frequency.value = 200;
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0.3, t);
    gain.gain.linearRampToValueAtTime(0.0, t + 0.2);
    
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 300;

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(this.sfxGain);
    osc.start(t); osc.stop(t + 0.2);
    this._trackSfx(osc);
  }

  sfx_playerHurt() {
    if(!this.settings.sfxEnabled) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, t);
    osc.frequency.linearRampToValueAtTime(120, t + 0.3);
    
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0.7, t);
    gain.gain.linearRampToValueAtTime(0.0, t + 0.3);
    
    osc.connect(gain);
    gain.connect(this.sfxGain);
    osc.start(t); osc.stop(t + 0.3);
  }

  sfx_playerDeath() {
    if(!this.settings.sfxEnabled) return;
    const t = this.ctx.currentTime;
    const freqs = [400, 320, 250];
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0.5, t);
    gain.gain.linearRampToValueAtTime(0.0, t + 1.0);
    
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 800;
    filter.connect(gain);
    gain.connect(this.sfxGain);

    freqs.forEach(f => {
      const osc = this.ctx.createOscillator();
      osc.frequency.setValueAtTime(f, t);
      osc.frequency.linearRampToValueAtTime(100, t + 0.8);
      osc.connect(filter);
      osc.start(t); osc.stop(t + 1.0);
      this._trackSfx(osc);
    });
  }

  sfx_coinCollect() {
    if(!this.settings.sfxEnabled) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    osc.frequency.value = 523; // C5
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0.3, t);
    gain.gain.linearRampToValueAtTime(0.0, t + 0.08);
    osc.connect(gain);
    gain.connect(this.sfxGain);
    osc.start(t); osc.stop(t + 0.08);
  }

  sfx_crystalCollect() {
    if(!this.settings.sfxEnabled) return;
    const t = this.ctx.currentTime;
    const freqs = [330, 415, 494];
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0.4, t);
    gain.gain.linearRampToValueAtTime(0.0, t + 0.4);
    gain.connect(this.sfxGain);

    freqs.forEach(f => {
      const osc = this.ctx.createOscillator();
      osc.frequency.value = f;
      osc.connect(gain);
      osc.start(t); osc.stop(t + 0.4);
    });
  }

  sfx_checkpoint() {
    if(!this.settings.sfxEnabled) return;
    const t = this.ctx.currentTime;
    const freqs = [262, 392];
    freqs.forEach((f, i) => {
      const osc = this.ctx.createOscillator();
      osc.frequency.value = f;
      const gain = this.ctx.createGain();
      const offset = i * 0.25;
      gain.gain.setValueAtTime(0.5, t + offset);
      gain.gain.linearRampToValueAtTime(0.0, t + offset + 0.2);
      osc.connect(gain);
      gain.connect(this.sfxGain);
      osc.start(t + offset); osc.stop(t + offset + 0.2);
    });
  }

  sfx_gravityLocked() {
    if(!this.settings.sfxEnabled) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    osc.type = 'square';
    osc.frequency.value = 60;
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0.3, t);
    gain.gain.setValueAtTime(0.3, t + 0.5);
    gain.gain.linearRampToValueAtTime(0.0, t + 0.51);
    osc.connect(gain);
    gain.connect(this.sfxGain);
    osc.start(t); osc.stop(t + 0.51);
  }

  sfx_bossIntro() {
    if(!this.settings.sfxEnabled) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    osc.frequency.value = 40;
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.7, t + 1.25);
    gain.gain.linearRampToValueAtTime(0, t + 2.5);
    osc.connect(gain);
    gain.connect(this.sfxGain);
    osc.start(t); osc.stop(t + 2.5);
  }

  sfx_uiSelect() {
    if(!this.settings.sfxEnabled) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    osc.type = 'square';
    osc.frequency.value = 440;
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0.2, t);
    gain.gain.linearRampToValueAtTime(0, t + 0.06);
    osc.connect(gain);
    gain.connect(this.sfxGain);
    osc.start(t); osc.stop(t + 0.06);
  }

  sfx_uiBack() {
    if(!this.settings.sfxEnabled) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    osc.type = 'square';
    osc.frequency.value = 330;
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0.2, t);
    gain.gain.linearRampToValueAtTime(0, t + 0.06);
    osc.connect(gain);
    gain.connect(this.sfxGain);
    osc.start(t); osc.stop(t + 0.06);
  }

  // --- Procedural Music ---
  stopMusic() {
    this.musicOscillators.forEach(osc => {
      try {
        osc.gainNode.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 1.0);
        osc.osc.stop(this.ctx.currentTime + 1.1);
      } catch(e) {}
    });
    this.musicOscillators = [];
  }

  playMusicMenu() {
    this.stopMusic();
    if(!this.settings.musicEnabled) return;
    
    // Ambient drone
    const t = this.ctx.currentTime;
    
    const osc1 = this.ctx.createOscillator();
    osc1.frequency.value = 55; // A1
    const gain1 = this.ctx.createGain();
    gain1.gain.setValueAtTime(0, t);
    gain1.gain.linearRampToValueAtTime(0.1, t + 1.0);
    osc1.connect(gain1); gain1.connect(this.musicGain);

    const osc2 = this.ctx.createOscillator();
    osc2.frequency.value = 82; // E2
    const gain2 = this.ctx.createGain();
    gain2.gain.setValueAtTime(0, t);
    gain2.gain.linearRampToValueAtTime(0.07, t + 1.0);
    osc2.connect(gain2); gain2.connect(this.musicGain);

    // LFO on gain1
    const lfo = this.ctx.createOscillator();
    lfo.frequency.value = 0.5;
    const lfoGain = this.ctx.createGain();
    lfoGain.gain.value = 0.03;
    lfo.connect(lfoGain);
    lfoGain.connect(gain1.gain);

    osc1.start(t); osc2.start(t); lfo.start(t);
    this.musicOscillators.push({osc: osc1, gainNode: gain1}, {osc: osc2, gainNode: gain2}, {osc: lfo, gainNode: lfoGain});
  }

  playMusicGameplay(zoneId) {
    this.stopMusic();
    if(!this.settings.musicEnabled) return;
    
    const zones = [
      { base: 110, bpm: 120 }, // Z1
      { base:  98, bpm: 130 }, // Z2
      { base: 130, bpm:  90 }, // Z3
      { base: 146, bpm: 140 }, // Z4
      { base:  82, bpm: 150 }, // Z5
      { base:  82, bpm: 150 }  // Fallback
    ];
    const z = zones[zoneId - 1] || zones[0];

    const t = this.ctx.currentTime;
    
    const osc = this.ctx.createOscillator();
    osc.frequency.value = z.base;
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.1, t + 1.0);
    
    // pulse LFO
    const lfo = this.ctx.createOscillator();
    lfo.frequency.value = z.bpm / 60; // hz
    const lfoGain = this.ctx.createGain();
    lfoGain.gain.value = 0.05;
    lfo.connect(lfoGain);
    lfoGain.connect(gain.gain);

    osc.connect(gain); gain.connect(this.musicGain);
    osc.start(t); lfo.start(t);

    this.musicOscillators.push({osc, gainNode: gain}, {osc: lfo, gainNode: lfoGain});
  }
}

class Particle {
  constructor() {
    this.active = false;
    this.x = 0; this.y = 0;
    this.vx = 0; this.vy = 0;
    this.life = 0; this.maxLife = 1;
    this.size = 2;
    this.color = '#FFFFFF';
    this.alpha = 1.0;
    this.fadeRate = 1.0;
    this.gravity = 0;
    this.rotation = 0;
    this.rotationSpeed = 0;
    this.shape = 'circle';
  }
}

class ParticleSystem {
  constructor(saveData) {
    this.pool = Array.from({ length: 500 }, () => new Particle());
    this.quality = saveData.settings.particleQuality;
    this.multiplier = this.quality === 'HIGH' ? 1.0 : this.quality === 'MEDIUM' ? 0.6 : this.quality === 'LOW' ? 0.3 : 0;
    
    // Non-particle explosions
    this.rings = []; 
  }

  updateSettings(quality) {
    this.quality = quality;
    this.multiplier = this.quality === 'HIGH' ? 1.0 : this.quality === 'MEDIUM' ? 0.6 : this.quality === 'LOW' ? 0.3 : 0;
  }

  _getParticle() {
    return this.pool.find(p => !p.active);
  }

  update(dt, currentGravityFlipped) {
    for (let p of this.pool) {
      if (!p.active) continue;
      p.life += dt;
      if (p.life >= p.maxLife) {
        p.active = false;
        continue;
      }
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      
      const gravDir = currentGravityFlipped ? -1 : 1;
      p.vy += p.gravity * gravDir * dt;
      
      p.rotation += p.rotationSpeed * dt;
      p.alpha = Math.max(0, p.alpha - p.fadeRate * dt);
    }

    for (let i = this.rings.length - 1; i >= 0; i--) {
      let r = this.rings[i];
      r.life += dt;
      if (r.life >= r.maxLife) {
        this.rings.splice(i, 1);
      }
    }
  }

  draw(ctx, camera) {
    ctx.save();
    if(camera) ctx.translate(-camera.x, -camera.y);

    for (let p of this.pool) {
      if (!p.active) continue;
      
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.strokeStyle = p.color;
      
      if (p.shape === 'circle') {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      } else if (p.shape === 'square') {
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation);
        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
        ctx.rotate(-p.rotation);
        ctx.translate(-p.x, -p.y);
      } else if (p.shape === 'line') {
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x - p.vx * 0.05, p.y - p.vy * 0.05); // streaky
        ctx.lineWidth = p.size;
        ctx.stroke();
      } else if (p.shape === 'star') {
        this._drawStar(ctx, p.x, p.y, 6, p.size, p.size/2.5);
      }
    }

    for (let r of this.rings) {
      let progress = r.life / r.maxLife;
      let alpha = 1 - progress;
      let radius = r.maxRadius * progress;
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = r.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(r.x, r.y, radius, 0, Math.PI * 2);
      ctx.stroke();
    }

    ctx.restore();
  }

  _drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
      let rot = Math.PI / 2 * 3;
      let x = cx, y = cy;
      let step = Math.PI / spikes;

      ctx.beginPath();
      ctx.moveTo(cx, cy - outerRadius)
      for (let i = 0; i < spikes; i++) {
          x = cx + Math.cos(rot) * outerRadius;
          y = cy + Math.sin(rot) * outerRadius;
          ctx.lineTo(x, y)
          rot += step
          x = cx + Math.cos(rot) * innerRadius;
          y = cy + Math.sin(rot) * innerRadius;
          ctx.lineTo(x, y)
          rot += step
      }
      ctx.lineTo(cx, cy - outerRadius);
      ctx.closePath();
      ctx.fill();
  }

  // --- Emitters ---

  emitGravityFlip(x, y, isFlippedNow) {
    if (this.multiplier === 0) return;
    let count = Math.floor(12 * this.multiplier);
    const color = isFlippedNow ? '#00FFFF' : '#AA00FF';
    
    for (let i = 0; i < count; i++) {
      let p = this._getParticle();
      if (!p) break;
      p.active = true; p.x = x; p.y = y;
      const angle = Math.random() * Math.PI * 2;
      const speed = 80 + Math.random() * 120;
      p.vx = Math.cos(angle) * speed; p.vy = Math.sin(angle) * speed;
      p.life = 0; p.maxLife = 0.4 + Math.random() * 0.2;
      p.size = 3 + Math.random() * 3;
      p.color = color; p.alpha = 1.0;
      p.fadeRate = 1 / p.maxLife; p.gravity = 0;
      p.shape = 'circle';
    }
  }

  emitMeleeSlash(x, y, direction, gravFlipped) {
    if (this.multiplier === 0) return;
    let count = Math.floor(8 * this.multiplier);
    const baseAngle = direction > 0 ? 0 : Math.PI;
    
    for(let i=0; i<count; i++) {
      let p = this._getParticle();
      if(!p) break;
      const angle = baseAngle - Math.PI/4 + Math.random() * Math.PI/2;
      const speed = 150 + Math.random() * 150;
      p.active = true; p.x = x; p.y = y;
      p.vx = Math.cos(angle) * speed; p.vy = Math.sin(angle) * speed;
      if (gravFlipped) p.vy *= -1; // roughly adjust to gravity aim
      p.life = 0; p.maxLife = 0.2 + Math.random()*0.1;
      p.size = 2 + Math.random() * 2;
      p.color = '#FFFFFF'; p.alpha = 1.0; p.fadeRate = 1/p.maxLife; p.gravity = 0;
      p.shape = 'line';
    }
  }

  emitBulletHit(x, y) {
    if (this.multiplier === 0) return;
    let count = Math.floor(6 * this.multiplier);
    for(let i=0; i<count; i++) {
      let p = this._getParticle();
      if(!p) break;
      p.active = true; p.x = x; p.y = y;
      const angle = Math.random() * Math.PI * 2;
      const speed = 50 + Math.random() * 70;
      p.vx = Math.cos(angle) * speed; p.vy = Math.sin(angle) * speed;
      p.life = 0; p.maxLife = 0.15 + Math.random()*0.1;
      p.size = 2 + Math.random() * 1;
      p.color = '#00FFFF'; p.alpha = 1.0; p.fadeRate = 1/p.maxLife; p.gravity = 0;
      p.shape = 'circle';
    }
  }

  emitEnemyDeath(x, y, enemyColor) {
    if (this.multiplier === 0) return;
    let count = Math.floor(20 * this.multiplier);
    for(let i=0; i<count; i++) {
      let p = this._getParticle();
      if(!p) break;
      p.active = true; p.x = x; p.y = y;
      const angle = Math.random() * Math.PI * 2;
      const speed = 60 + Math.random() * 190;
      p.vx = Math.cos(angle) * speed; p.vy = Math.sin(angle) * speed;
      p.life = 0; p.maxLife = 0.5 + Math.random()*0.3;
      p.size = 3 + Math.random() * 5;
      p.color = Math.random() > 0.3 ? enemyColor : '#FFA500';
      p.alpha = 1.0; p.fadeRate = 1/p.maxLife; p.gravity = 300;
      p.shape = Math.random() > 0.5 ? 'square' : 'circle';
      p.rotationSpeed = Math.random() * 10 - 5;
      p.rotation = 0;
    }
  }

  emitExplosion(x, y, radius, intensity) {
    if (this.multiplier === 0) return;
    let count = Math.min(30, Math.floor(intensity * 3 * this.multiplier));
    
    // Add ring
    this.rings.push({x, y, maxRadius: radius, color: '#FFFFFF', life: 0, maxLife: 0.4 });

    for(let i=0; i<count; i++) {
      let p = this._getParticle();
      if(!p) break;
      p.active = true; p.x = x; p.y = y;
      const angle = Math.random() * Math.PI * 2;
      const speed = (100 + Math.random() * 300) * intensity;
      p.vx = Math.cos(angle) * speed; p.vy = Math.sin(angle) * speed;
      p.life = 0; p.maxLife = 0.4 + Math.random()*0.5;
      p.size = 4 + Math.random() * 8;
      
      // We will fake the gradient by just picking random colors in the gradient
      const cChance = Math.random();
      p.color = cChance > 0.6 ? '#FFFFFF' : (cChance > 0.3 ? '#FFA500' : '#FF0000');
      
      p.alpha = 1.0; p.fadeRate = 1/p.maxLife; p.gravity = 0;
      p.shape = 'circle';
    }
  }

  emitGroundPound(x, y, gravFlipped) {
    if (this.multiplier === 0) return;
    let count = Math.floor(20 * this.multiplier);
    for(let i=0; i<count; i++) {
      let p = this._getParticle();
      if(!p) break;
      p.active = true; p.x = x; p.y = y;
      const angle = (Math.random() > 0.5 ? 0 : Math.PI) + (Math.random()*0.2 - 0.1);
      const speed = 80 + Math.random() * 120;
      p.vx = Math.cos(angle) * speed * (Math.random() > 0.5 ? 1 : -1);
      p.vy = (Math.random() - 0.5) * 50; 
      p.life = 0; p.maxLife = 0.3 + Math.random()*0.2;
      p.size = 2 + Math.random() * 3;
      p.color = '#EEEEEE'; p.alpha = 1.0; p.fadeRate = 1/p.maxLife; p.gravity = 0;
      p.shape = 'circle';
    }
  }

  emitDashTrail(x, y, facingDir) {
    if (this.multiplier === 0) return;
    let count = Math.floor(4 * this.multiplier);
    for(let i=0; i<count; i++) {
      let p = this._getParticle();
      if(!p) break;
      p.active = true; p.x = x; p.y = y;
      p.vx = (10 + Math.random()*20) * -facingDir; 
      p.vy = (Math.random()-0.5)*20;
      p.life = 0; p.maxLife = 0.15 + Math.random() * 0.05;
      p.size = 8 + Math.random() * 6;
      p.color = '#1a0a2a'; p.alpha = 0.4; p.fadeRate = 0.4/p.maxLife; p.gravity = 0;
      p.shape = 'circle';
    }
  }

  emitCoinCollect(x, y) {
    if (this.multiplier === 0) return;
    let count = Math.floor(6 * this.multiplier);
    for(let i=0; i<count; i++) {
      let p = this._getParticle();
      if(!p) break;
      p.active = true; p.x = x; p.y = y;
      p.vx = (Math.random()-0.5)*100;
      p.vy = -60 - Math.random() * 60; // Upward burst
      p.life = 0; p.maxLife = 0.3 + Math.random()*0.2;
      p.size = 2 + Math.random() * 2;
      p.color = '#FFD700'; p.alpha = 1.0; p.fadeRate = 1/p.maxLife; p.gravity = 400; // Fake some normal gravity for falling
      p.shape = 'circle';
    }
  }

  emitCrystalCollect(x, y) {
    if (this.multiplier === 0) return;
    let count = Math.floor(10 * this.multiplier);
    for(let i=0; i<count; i++) {
      let p = this._getParticle();
      if(!p) break;
      p.active = true; p.x = x; p.y = y;
      p.vx = (Math.random()-0.5)*100;
      p.vy = -40 - Math.random() * 60;
      p.life = 0; p.maxLife = 0.5 + Math.random()*0.2;
      p.size = 2 + Math.random() * 3;
      p.color = '#00FFFF'; p.alpha = 1.0; p.fadeRate = 1/p.maxLife; p.gravity = 0;
      p.shape = 'star';
      p.rotationSpeed = Math.random() * 5;
    }
  }

  emitAmbient(zoneId, camera) {
    if (this.multiplier === 0) return;
    // Emit 0-2 particles per frame
    if(Math.random() > 0.1 * this.multiplier) return;

    let p = this._getParticle();
    if(!p) return;

    // Spawn randomly in camera view
    p.active = true; 
    p.x = camera.x + Math.random() * CONSTANTS.WIDTH;
    p.y = camera.y + Math.random() * CONSTANTS.HEIGHT;

    p.alpha = 1.0;
    p.rotation = 0; p.rotationSpeed = 0;

    switch(zoneId) {
      case 1:
        p.vx = (Math.random()-0.5)*10; p.vy = -10 - Math.random()*20;
        p.life = 0; p.maxLife = 2 + Math.random()*2;
        p.size = 1; p.color = '#FFFFFF'; p.fadeRate = 1/p.maxLife; p.gravity = 0; p.shape='circle';
        p.alpha = 0.05; p.fadeRate = 0.05/p.maxLife;
        break;
      case 2:
        p.vx = (Math.random()-0.5)*20; p.vy = -30 - Math.random()*40;
        p.life = 0; p.maxLife = 1 + Math.random()*2;
        p.size = 2; p.color = '#FFA500'; p.fadeRate = 1/p.maxLife; p.gravity = -200; p.shape='square';
        break;
      case 3:
        p.vx = 20 + Math.random()*30; p.vy = 20 + Math.random()*30;
        p.life = 0; p.maxLife = 2 + Math.random()*3;
        p.size = 1 + Math.random()*2; p.color = '#FFFFFF'; p.fadeRate = 1/p.maxLife; p.gravity = 0; p.shape='circle';
        break;
      case 4:
        p.vx = -100 - Math.random()*100; p.vy = 0;
        p.life = 0; p.maxLife = 1 + Math.random()*1;
        p.size = 1; p.color = '#00FF00'; p.fadeRate = 1/p.maxLife; p.gravity = 0; p.shape='square';
        break;
      case 5:
        p.vx = (Math.random()-0.5)*50; p.vy = (Math.random()-0.5)*50;
        p.life = 0; p.maxLife = 2 + Math.random()*2;
        p.size = 1 + Math.random(); p.color = '#AA0000'; p.fadeRate = 1/p.maxLife; p.gravity = 0; p.shape='circle';
        break;
      default:
        p.active = false;
    }
  }

  // Effect specifically for boss defeat
  emitBossExplosion(x, y) {
    if (this.multiplier === 0) return;
    this.emitExplosion(x, y, 150, 4.0);
    this.emitEnemyDeath(x, y, '#FF0000');
  }
}

class Camera {
  constructor() {
    this.x = 0;
    this.y = 0;
    this.zoom = 1.0;
    this.shakeMag = 0;
    this.shakeDur = 0;
    this.shakeTimer = 0;
  }

  update(dt, player, mapWidth, mapHeight, settings) {
    if (!player) return;
    
    // Smooth follow (lerp factor 0.08 equivalent implemented via dt speed)
    const lerp = 5.0 * dt; 
    
    // Target X: centered on player
    let targetX = player.x - CONSTANTS.WIDTH / 2;
    
    // Vertical deadzone: 80px above/below center
    let playerScreenY = player.y - this.y;
    let targetY = this.y;
    
    if (playerScreenY < CONSTANTS.HEIGHT/2 - 80) {
      targetY = player.y - (CONSTANTS.HEIGHT/2 - 80);
    } else if (playerScreenY > CONSTANTS.HEIGHT/2 + 80) {
      targetY = player.y - (CONSTANTS.HEIGHT/2 + 80);
    }

    this.x += (targetX - this.x) * lerp;
    this.y += (targetY - this.y) * lerp;

    // Clamp to level bounds
    // Max map dimensions based on tiles
    const mapW = mapWidth * CONSTANTS.TILE_SIZE;
    const mapH = mapHeight * CONSTANTS.TILE_SIZE;
    
    // Prevent zooming camera out of bounds logic
    const scaledW = CONSTANTS.WIDTH / this.zoom;
    const scaledH = CONSTANTS.HEIGHT / this.zoom;

    this.x = Math.max(0, Math.min(this.x, mapW - scaledW));
    this.y = Math.max(0, Math.min(this.y, mapH - scaledH));

    // Screen Shake
    this.shakeX = 0;
    this.shakeY = 0;
    if (settings.screenShake === 'ON' && this.shakeTimer > 0) {
      this.shakeTimer -= dt;
      let factor = this.shakeTimer / this.shakeDur; // Exponential decay approximated
      let mag = this.shakeMag * factor;
      this.shakeX = (Math.random() - 0.5) * 2 * mag;
      this.shakeY = (Math.random() - 0.5) * 2 * mag;
    }
  }

  addShake(mag, dur) {
    this.shakeMag = mag;
    this.shakeDur = dur;
    this.shakeTimer = dur;
  }

  zoomTo(targetZoom, overTime) {
    // We can implement smooth zoom by updating zoom linearly over overTime
    // For now simple immediate or skip lerp as required
    this.zoom = targetZoom;
  }
}

class Renderer {
  constructor() {
    this.canvas = document.getElementById('gameCanvas');
    this.ctx = this.canvas.getContext('2d', { alpha: false }); // Opt for no alpha channel if game fills it
    this.offscreenCanvas = document.createElement('canvas');
    this.offCtx = this.offscreenCanvas.getContext('2d');
    this.cachedZone = -1;
  }

  cacheMap(world) {
    // Render static map to offscreen canvas
    this.offscreenCanvas.width = world.width * CONSTANTS.TILE_SIZE;
    this.offscreenCanvas.height = world.height * CONSTANTS.TILE_SIZE;
    this.offCtx.clearRect(0, 0, this.offscreenCanvas.width, this.offscreenCanvas.height);
    
    // Draw tiles 
    // We leave background drawing to main render loop due to parallax
    world.drawStaticTiles(this.offCtx);
    this.cachedZone = world.zoneId;
  }

  render(engine) {
    const { state, camera, world, player, entities, particles, ui } = engine;
    const settings = engine.saveManager.data.settings;
    
    // Clear screen
    this.ctx.fillStyle = '#000000';
    this.ctx.fillRect(0, 0, CONSTANTS.WIDTH, CONSTANTS.HEIGHT);

    // Apply Camera
    this.ctx.save();
    
    if (state === GAME_STATE.GAMEPLAY || state === GAME_STATE.BOSS_INTRO) {
      if(settings.parallax === 'ON') {
        world.drawBackground(this.ctx, camera);
      } else {
        world.drawFlatBackground(this.ctx); // Base color
      }

      this.ctx.translate(-camera.x + camera.shakeX, -camera.y + camera.shakeY);
      this.ctx.scale(camera.zoom, camera.zoom);

      // Draw cached static tiles for current viewport
      if (this.cachedZone === world.zoneId) {
        // Source region (what camera sees)
        const sx = Math.max(0, camera.x);
        const sy = Math.max(0, camera.y);
        const sWidth = CONSTANTS.WIDTH / camera.zoom;
        const sHeight = CONSTANTS.HEIGHT / camera.zoom;
        
        // Dest region
        const dx = sx; 
        const dy = sy;
        
        this.ctx.drawImage(this.offscreenCanvas, 
          sx, sy, sWidth, sHeight, 
          dx, dy, sWidth, sHeight);
      }

      // Draw interactable entities (items, moving platforms, destructible blocks)
      world.drawDynamicTiles(this.ctx);

      // Draw Entities sorted by layer or just generally (Player, Enemies, Projectiles)
      for (const e of entities) {
        // Culling optimization
        if (e.x + e.width < camera.x - 200 || e.x > camera.x + CONSTANTS.WIDTH/camera.zoom + 200 ||
            e.y + e.height < camera.y - 200 || e.y > camera.y + CONSTANTS.HEIGHT/camera.zoom + 200) {
              continue;
        }
        e.draw(this.ctx);
      }

      if(player) {
         player.draw(this.ctx); // ensure player overlaps properly
      }

      this.ctx.restore();

      // Particles render above everything
      particles.draw(this.ctx, camera);
      
      // HUD overlays
      ui.drawHUD(this.ctx, engine);
    }
    
    if (state === GAME_STATE.PAUSED || state === GAME_STATE.MAIN_MENU || 
        state === GAME_STATE.SETTINGS || state === GAME_STATE.GAME_OVER ||
        state === GAME_STATE.BOOT || state === GAME_STATE.CUTSCENE || 
        state === GAME_STATE.VICTORY || state === GAME_STATE.CREDITS) {
      this.ctx.restore(); // Ensure no transforms for UI
      ui.drawMenu(this.ctx, engine);
      if (engine.scenes[state] && engine.scenes[state].draw) {
        engine.scenes[state].draw(this.ctx);
      }
    }
  }
}

class UIManager {
  constructor() {
    this.menuSelection = 0;
    this.mainMenuItems = ['NEW GAME', 'CONTINUE', 'SETTINGS', 'CREDITS', 'QUIT'];
    
    this.settingsSelection = 0;
    this.settingsItemsRow = 0; // 0: Audio, 1: Video, 2: Gameplay etc. structure depends on impl
    
    this.pauseSelection = 0;
    this.pauseItems = ['RESUME', 'SETTINGS', 'RESTART ZONE', 'QUIT TO MENU'];
    
    this.gameOverSelection = 0;
    this.gameOverItems = ['RETRY FROM CHECKPOINT', 'RETRY FROM ZONE START', 'QUIT TO MENU'];
    
    this.fadeAlpha = 0;
    this.fadeTarget = 0;
    
    this.notifications = [];
    this.bossBarAlpha = 0;
  }

  update(dt) {
    if(this.fadeAlpha < this.fadeTarget) {
      this.fadeAlpha = Math.min(this.fadeTarget, this.fadeAlpha + dt * 3); // 300ms fade
    } else if (this.fadeAlpha > this.fadeTarget) {
      this.fadeAlpha = Math.max(this.fadeTarget, this.fadeAlpha - dt * 3);
    }

    for (let i = this.notifications.length - 1; i >= 0; i--) {
      this.notifications[i].time -= dt;
      if(this.notifications[i].time <= 0) this.notifications.splice(i, 1);
    }
  }

  showNotification(text, color, duration) {
    this.notifications.push({text, color, maxTime: duration, time: duration});
  }

  drawHUD(ctx, engine) {
    const p = engine.player;
    if(!p) return;

    // Top Left: HP Bar
    ctx.fillStyle = '#000000';
    ctx.strokeStyle = '#222222';
    ctx.lineWidth = 2;
    ctx.fillRect(20, 20, 200, 14);
    ctx.strokeRect(20, 20, 200, 14);

    const hpIter = p.hp / p.maxHp;
    ctx.fillStyle = hpIter < 0.25 ? ((Math.floor(Date.now() / 150) % 2) ? '#FF0000' : '#880000') : '#FF0000';
    ctx.fillRect(22, 22, 196 * hpIter, 10);
    
    // Draw 5 segments logic
    for(let i=1; i<5; i++){
      ctx.fillStyle = '#000000';
      ctx.fillRect(20 + i*40, 20, 2, 14);
    }

    ctx.fillStyle = '#FFFFFF';
    ctx.font = '10px Arial';
    ctx.fillText('HP', 225, 30);

    // Energy Bar
    ctx.fillStyle = '#000000';
    ctx.fillRect(20, 42, 200, 10);
    ctx.strokeRect(20, 42, 200, 10);

    const enIter = p.energy / p.maxEnergy;
    ctx.fillStyle = enIter > 0.5 ? '#00FFFF' : (enIter > 0.25 ? '#FFFF00' : '#FF0000');
    if (p.energy <= 0 && Math.floor(Date.now() / 150) % 2) ctx.fillStyle = '#FF5555';
    ctx.fillRect(22, 44, 196 * enIter, 6);
    
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText('EN', 225, 51);

    // Coins & Crystals
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(280, 27, 5, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 14px Arial';
    ctx.fillText(p.coins, 290, 32);

    ctx.fillStyle = '#00FFFF';
    ctx.beginPath();
    // primitive star for icon
    ctx.moveTo(330, 22); ctx.lineTo(333, 27); ctx.lineTo(338, 27); ctx.lineTo(334, 31);
    ctx.lineTo(336, 36); ctx.lineTo(330, 33); ctx.lineTo(324, 36); ctx.lineTo(326, 31);
    ctx.lineTo(322, 27); ctx.lineTo(327, 27); ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText(p.crystals, 345, 32);

    // Top Right
    ctx.textAlign = 'right';
    ctx.fillStyle = '#AAAAAA';
    ctx.font = 'italic 16px Arial';
    ctx.fillText(`ZONE ${engine.world.zoneId}: ${engine.world.getZoneName()}`, CONSTANTS.WIDTH - 20, 30);
    
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px Arial';
    ctx.fillText(`SCORE: ${p.score}`, CONSTANTS.WIDTH - 20, 55);

    // Boss Bar
    if(engine.world.activeBoss) {
      if(this.bossBarAlpha < 1.0) this.bossBarAlpha += 0.05;
      const b = engine.world.activeBoss;
      ctx.globalAlpha = this.bossBarAlpha;
      ctx.fillStyle = '#FF0000';
      const bWh = CONSTANTS.WIDTH - 80;
      const bHp = b.hp / b.maxHp;
      ctx.fillRect(40, CONSTANTS.HEIGHT - 40, bWh * bHp, 24);
      ctx.strokeRect(40, CONSTANTS.HEIGHT - 40, bWh, 24);
      
      ctx.fillStyle = '#FFFFFF';
      ctx.textAlign = 'center';
      ctx.font = 'bold 16px Arial';
      ctx.fillText(b.name, CONSTANTS.WIDTH/2, CONSTANTS.HEIGHT - 45);
      ctx.globalAlpha = 1.0;
    } else {
      if(this.bossBarAlpha > 0) this.bossBarAlpha -= 0.05;
    }

    // Notifications
    ctx.textAlign = 'center';
    let ny = CONSTANTS.HEIGHT / 2 - 100;
    for(let n of this.notifications){
      const progress = n.time / n.maxTime;
      ctx.globalAlpha = progress > 0.8 ? (1-progress)*5 : (progress < 0.2 ? progress*5 : 1);
      ctx.fillStyle = n.color;
      ctx.font = 'bold 24px Arial';
      ctx.fillText(n.text, CONSTANTS.WIDTH/2, ny);
      ny += 30;
    }
    ctx.globalAlpha = 1.0;
    ctx.textAlign = 'left';
  }

  drawMenu(ctx, engine) {
    const s = engine.state;
    // Helper to draw dark overlay
    const overlay = (alpha) => {
      ctx.fillStyle = `rgba(0,0,0,${alpha})`;
      ctx.fillRect(0, 0, CONSTANTS.WIDTH, CONSTANTS.HEIGHT);
    };

    if (s === GAME_STATE.BOOT) {
      overlay(1);
      ctx.fillStyle = '#FFFFFF';
      ctx.textAlign = 'center';
      const bootProgress = engine.bootTimer / 2.8;
      if (bootProgress > 0.17 && bootProgress < 0.53) {
         ctx.font = '20px Arial';
         ctx.fillText('GRAVSHIFT STUDIOS', CONSTANTS.WIDTH/2, CONSTANTS.HEIGHT/2 + 40);
         // Logo primitive
         ctx.beginPath(); ctx.arc(CONSTANTS.WIDTH/2 - 15, CONSTANTS.HEIGHT/2-20, 20, 0, Math.PI*2); ctx.stroke();
         ctx.beginPath(); ctx.arc(CONSTANTS.WIDTH/2 + 15, CONSTANTS.HEIGHT/2-20, 20, 0, Math.PI*2); ctx.stroke();
         ctx.beginPath(); ctx.moveTo(CONSTANTS.WIDTH/2 - 40, CONSTANTS.HEIGHT/2 - 40); ctx.lineTo(CONSTANTS.WIDTH/2 + 40, CONSTANTS.HEIGHT/2); ctx.stroke();
      } else if (bootProgress >= 0.7) {
        ctx.font = '16px Console, monospace';
        ctx.fillText('INITIALIZING SYSTEMS...', CONSTANTS.WIDTH/2, CONSTANTS.HEIGHT/2);
        ctx.strokeRect(CONSTANTS.WIDTH/2 - 100, CONSTANTS.HEIGHT/2 + 20, 200, 10);
        ctx.fillRect(CONSTANTS.WIDTH/2 - 100, CONSTANTS.HEIGHT/2 + 20, 200 * ((bootProgress-0.7)/0.3), 10);
      }
    } 
    else if (s === GAME_STATE.MAIN_MENU) {
      this._drawMainMenu(ctx, engine);
    }
    else if (s === GAME_STATE.PAUSED) {
      overlay(0.7);
      ctx.fillStyle = '#00FFFF';
      ctx.textAlign = 'center';
      ctx.font = 'bold 60px Arial';
      ctx.fillText('PAUSED', CONSTANTS.WIDTH/2, 150);

      this.pauseItems.forEach((item, i) => {
         const y = 300 + i * 50;
         ctx.fillStyle = i === this.pauseSelection ? '#00FFFF' : '#AAAAAA';
         ctx.font = 'bold 24px Arial';
         const text = (item === 'RESUME' ? '' : '') + item; // Can add logic here
         ctx.fillText(text, CONSTANTS.WIDTH/2, y);
         if(i === this.pauseSelection) {
           ctx.fillText('>', CONSTANTS.WIDTH/2 - ctx.measureText(item).width/2 - 20, y);
         }
      });
    }
    // ... Settings, Cutscene, and more will be implemented dynamically
  }

  _drawMainMenu(ctx, engine) {
    ctx.fillStyle = '#000000';
    ctx.fillRect(0,0,CONSTANTS.WIDTH,CONSTANTS.HEIGHT);
    
    // Parallax background for menu (Starfield layer 1)
    ctx.fillStyle = '#FFFFFF';
    for(let i=0; i<200; i++) {
       let px = (i * 37 + engine.menuTime * 10) % CONSTANTS.WIDTH;
       let py = (i * 91) % CONSTANTS.HEIGHT;
       ctx.fillRect(px, py, 1, 1);
    }
    // Nebula layer (simplified blobs)
    ctx.fillStyle = 'rgba(128, 0, 255, 0.05)';
    for(let i=0; i<5; i++) {
       let px = (i * 300 + engine.menuTime * 20) % (CONSTANTS.WIDTH+400) - 200;
       ctx.beginPath(); ctx.arc(px, 300 + Math.sin(px)*100, 150, 0, Math.PI*2); ctx.fill();
    }
    // Station silhouette
    ctx.save();
    ctx.translate(CONSTANTS.WIDTH/2, CONSTANTS.HEIGHT + 200);
    ctx.rotate(engine.menuTime * Math.PI / 180 * -1); // slow rotate
    ctx.fillStyle = '#111115';
    ctx.beginPath(); ctx.moveTo(-600, 0); ctx.lineTo(-400, -200); ctx.lineTo(-200, -200); ctx.lineTo(-50, -400); ctx.lineTo(100, -300); ctx.lineTo(400, -350); ctx.lineTo(700, 0); ctx.closePath(); ctx.fill();
    ctx.restore();

    // Glitch title Text
    ctx.textAlign = 'center';
    ctx.font = 'bold 80px Arial';
    let titleT = "GRAVSHIFT";
    let isGlitch = Math.random() < 0.05 && engine.menuTime % 2 < 0.2;
    ctx.fillStyle = '#00FFFF';
    if(isGlitch) {
      ctx.fillText(titleT, CONSTANTS.WIDTH/2 + (Math.random()*10 - 5), 180);
      ctx.fillStyle = '#FF00FF';
      ctx.fillText(titleT, CONSTANTS.WIDTH/2 + (Math.random()*10 - 5), 180);
    } else {
      ctx.fillText(titleT, CONSTANTS.WIDTH/2, 180);
    }
    ctx.font = 'bold 24px Arial';
    ctx.fillStyle = '#AA00FF';
    ctx.fillText("VOID PROTOCOL", CONSTANTS.WIDTH/2, 220);

    // Wraith anim
    let wy = CONSTANTS.HEIGHT/2 + Math.sin(engine.menuTime*Math.PI) * 10;
    ctx.fillStyle = 'rgba(170,0,255,0.2)';
    ctx.beginPath(); ctx.arc(300, wy + 20, 60, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(286, wy, 28, 48); // body
    
    // Items
    this.mainMenuItems.forEach((item, i) => {
       const y = 350 + i * 50;
       
       let displayColor = '#AAAAAA';
       if(i === 1 && !localStorage.getItem('gravshift_save')) displayColor = '#444444'; // grey out continue
       else if(i === this.menuSelection) displayColor = '#00FFFF';

       ctx.fillStyle = displayColor;
       ctx.font = `bold ${i === this.menuSelection ? 26 : 24}px Arial`;
       ctx.fillText(item, CONSTANTS.WIDTH/2, y);

       if(i === this.menuSelection) {
         ctx.fillText('>', CONSTANTS.WIDTH/2 - ctx.measureText(item).width/2 - 20, y);
       }
    });

  }
}

class CollisionEngine {
  static checkAABB(a, b) {
    return a.x < b.x + b.width &&
           a.x + a.width > b.x &&
           a.y < b.y + b.height &&
           a.y + a.height > b.y;
  }

  static checkAABB_expanded(a, b, pad) {
    return a.x - pad < b.x + b.width + pad &&
           a.x + a.width + pad > b.x - pad &&
           a.y - pad < b.y + b.height + pad &&
           a.y + a.height + pad > b.y - pad;
  }

  static resolveTileCollisions(entity, world, dt) {
    if (entity.isGravityImmune || entity.isDead) return;

    // Apply gravity
    const gravForce = entity.gravityFlipped ? -PHYSICS.gravity : PHYSICS.gravity;
    
    // Check if on wall for slide mechanics (player only essentially)
    if(entity.isPlayer && entity.wallClingDir !== 0) {
      if(Math.sign(entity.vy) === Math.sign(gravForce)) {
          entity.vy = Math.sign(gravForce) * PHYSICS.wallSlideSpeed;
      } else {
          entity.vy += gravForce * dt;
      }
    } else {
      entity.vy += gravForce * dt;
    }
    
    // Terminal velocity
    if (entity.vy > PHYSICS.terminalVelocity) entity.vy = PHYSICS.terminalVelocity;
    if (entity.vy < -PHYSICS.terminalVelocity) entity.vy = -PHYSICS.terminalVelocity;

    // Separate X and Y movement for slidey collision
    entity.x += entity.vx * dt;
    this._checkAxis(entity, world, 'x');

    entity.y += entity.vy * dt;
    this._checkAxis(entity, world, 'y');

    // World bounds clamp
    if (entity.x < 0) { entity.x = 0; entity.vx = 0; }
    if (entity.y < 0) { entity.y = 0; entity.vy = 0; entity.onGround = false; }
    // Max bounds handled by tile collisions on edges ideally, but we can hard cap
    const maxW = world.width * CONSTANTS.TILE_SIZE;
    const maxH = world.height * CONSTANTS.TILE_SIZE;
    if (entity.x + entity.width > maxW) { entity.x = maxW - entity.width; entity.vx = 0; }
    if (entity.y + entity.height > maxH) { entity.y = maxH - entity.height; entity.vy = 0; entity.onGround = false; }

    entity.updateStateAfterCollision();
  }

  static _checkAxis(entity, world, axis) {
    const ts = CONSTANTS.TILE_SIZE;
    // Get tiles in bounding box
    const startX = Math.floor(entity.x / ts);
    const endX = Math.floor((entity.x + entity.width - 0.01) / ts);
    const startY = Math.floor(entity.y / ts);
    const endY = Math.floor((entity.y + entity.height - 0.01) / ts);

    if(axis === 'y') entity.onGround = false;
    entity.touchingWall = 0;

    for (let y = startY; y <= endY; y++) {
      for (let x = startX; x <= endX; x++) {
        let tile = world.getTile(x, y);

        // Tile 2 & 3: Spikes, handled by entity loop. Tile 4: Energy drain
        // Only resolve physical blocks
        if (tile === 1 || tile === 5 || tile === 8) { 
          this._resolveSolid(entity, x, y, ts, axis);
        } else if (tile === 7 && axis === 'y') {
          // One-way platform
          this._resolveOneWay(entity, x, y, ts);
        }
      }
    }
  }

  static _resolveSolid(entity, tx, ty, ts, axis) {
    if (axis === 'x') {
      if (entity.vx > 0) {
        entity.x = tx * ts - entity.width;
        entity.vx = 0;
        entity.touchingWall = 1;
      } else if (entity.vx < 0) {
        entity.x = tx * ts + ts;
        entity.vx = 0;
        entity.touchingWall = -1;
      }
    } else if (axis === 'y') {
      if (entity.vy > 0) {
        entity.y = ty * ts - entity.height;
        entity.vy = 0;
        if(!entity.gravityFlipped) entity.onGround = true;
      } else if (entity.vy < 0) {
        entity.y = ty * ts + ts;
        entity.vy = 0;
        if(entity.gravityFlipped) entity.onGround = true;
      }
    }
  }

  static _resolveOneWay(entity, tx, ty, ts) {
    if (!entity.gravityFlipped && entity.vy > 0) {
      if (entity.prevY + entity.height <= ty * ts + 0.1) {
        entity.y = ty * ts - entity.height;
        entity.vy = 0;
        entity.onGround = true;
      }
    } else if (entity.gravityFlipped && entity.vy < 0) {
      if (entity.prevY >= ty * ts + ts - 0.1) {
        entity.y = ty * ts + ts;
        entity.vy = 0;
        entity.onGround = true;
      }
    }
  }
}

class IDDSystem {
  constructor(settings) {
    this.mode = settings.difficultyMode;
    this.timer = 0;
    this.deaths = 0;
    this.flips = 0;
    this.dmgDealt = 0;
    this.dmgTaken = 0;
    this.distX = 0;
    this.itemsCollected = 0;
    this.itemsPossible = 10; // avoid div by 0
    this.dashes = 0;
    
    this.performanceScore = 0.5; // Starts in middle

    // Modifiers that will be read by the game
    this.enemyHpMod = 1.0;
    this.enemySpeedMod = 1.0;
    this.enemyAggroMod = 1.0;
    this.pickupSpawnChance = 1.0;
    this.spawnElite = false;

    this._applyFixedMode();
  }

  _applyFixedMode() {
    if (this.mode !== 'AUTO') {
      switch(this.mode) {
        case 'EASY': this.performanceScore = 0.1; break;
        case 'NORMAL': this.performanceScore = 0.5; break;
        case 'HARD': this.performanceScore = 0.7; break;
        case 'NIGHTMARE': this.performanceScore = 0.95; break;
      }
      this._updateModifiers();
    }
  }

  update(dt, player) {
    if (this.mode !== 'AUTO') return;

    this.timer += dt;
    if (this.timer >= 30.0) { // Eval every 30s
      this._evaluate();
      this.timer = 0;
      // Reset counters
      this.deaths = 0; this.flips = 0; this.dmgDealt = 0; this.dmgTaken = 0;
      this.distX = 0; this.itemsCollected = 0; this.itemsPossible = 5; this.dashes = 0;
    }
  }

  _evaluate() {
    // 1. Deaths (scaled ~3 / 30s)
    let mDeath = 1.0 - Math.min(this.deaths / 3.0, 1.0);
    // 2. Combat (deal / taken)
    let comboEff = this.dmgTaken > 0 ? (this.dmgDealt / this.dmgTaken) : 3.0;
    let mCombat = Math.min(comboEff / 3.0, 1.0);
    // 3. Flips
    let mFlips = Math.min(this.flips / 20.0, 1.0);
    // 4. Speed (approx px per second / 150)
    let speed = (this.distX / 30.0);
    let mSpeed = Math.min(speed / 150.0, 1.0);
    // 5. Dash
    let mDash = Math.min(this.dashes / 10.0, 1.0);

    let newScore = (mDeath * 0.3) + (mCombat * 0.25) + (mFlips * 0.2) + (mSpeed * 0.15) + (mDash * 0.1);
    
    // Smooth lerp
    this.performanceScore = (this.performanceScore * 0.7) + (newScore * 0.3);
    this._updateModifiers();
  }

  _updateModifiers() {
    let p = this.performanceScore;
    if (p < 0.2) {
      this.enemyHpMod = 0.7; this.enemySpeedMod = 0.8; this.enemyAggroMod = 0.7;
      this.pickupSpawnChance = 1.5; this.spawnElite = false;
    } else if (p < 0.4) {
      this.enemyHpMod = 0.85; this.enemySpeedMod = 0.9; this.enemyAggroMod = 0.9;
      this.pickupSpawnChance = 1.2; this.spawnElite = false;
    } else if (p < 0.6) {
      this.enemyHpMod = 1.0; this.enemySpeedMod = 1.0; this.enemyAggroMod = 1.0;
      this.pickupSpawnChance = 1.0; this.spawnElite = false;
    } else if (p < 0.8) {
      this.enemyHpMod = 1.15; this.enemySpeedMod = 1.15; this.enemyAggroMod = 1.2;
      this.pickupSpawnChance = 0.8; this.spawnElite = false;
    } else {
      this.enemyHpMod = 1.30; this.enemySpeedMod = 1.30; this.enemyAggroMod = 1.5;
      this.pickupSpawnChance = (this.mode==='NIGHTMARE') ? 0 : 0.6; 
      this.spawnElite = true;
    }
  }

  // --- External Trackers ---
  recordDeath() { this.deaths++; }
  recordFlip() { this.flips++; }
  recordDash() { this.dashes++; }
  recordDamageDealt(amt) { this.dmgDealt += amt; }
  recordDamageTaken(amt) { this.dmgTaken += amt; }
  recordDistance(px) { this.distX += Math.abs(px); }
  recordItem() { this.itemsCollected++; }
  recordItemSpawnable() { this.itemsPossible++; }
}

class Entity {
  constructor(x, y, w, h) {
    this.x = x; this.y = y; this.prevX = x; this.prevY = y;
    this.width = w; this.height = h;
    this.vx = 0; this.vy = 0;
    this.isDead = false;
    
    this.hp = 10; this.maxHp = 10;
    this.gravityFlipped = false;
    this.isGravityImmune = false;
    this.onGround = false;
    this.touchingWall = 0;
    
    this.facingDir = 1; // 1 = right, -1 = left
    this.iframeTimer = 0;
    this.color = '#FFFFFF';
  }

  update(dt, engine) {
    this.prevX = this.x; this.prevY = this.y;
    if (this.iframeTimer > 0) this.iframeTimer -= dt;
  }
  
  updateStateAfterCollision() {}

  takeDamage(amt, knockbackDir, engine) {
    if(this.iframeTimer > 0 || this.isDead) return false;
    this.hp -= amt;
    if(knockbackDir !== 0) {
        this.vx += knockbackDir * 200;
        this.y -= (this.gravityFlipped ? -2 : 2); // small pop
    }
    this.iframeTimer = 0.2;
    if(this.hp <= 0) {
      this.hp = 0;
      this.die(engine);
    }
    return true;
  }

  die(engine) {
    this.isDead = true;
  }

  draw(ctx) {}
}

class Player extends Entity {
  constructor(saveData) {
    super(saveData.checkpointX, saveData.checkpointY, 28, 48);
    this.isPlayer = true;
    // Load stats
    const st = saveData.playerStats;
    this.hp = st.hp; this.maxHp = st.maxHp;
    this.energy = st.energy; this.maxEnergy = st.maxEnergy;
    this.coins = st.coins; this.crystals = st.crystals;
    this.score = st.score;

    this.upgrades = saveData.upgrades || [];

    // Core mechanic state
    this.dashTimer = 0;
    this.dashCooldown = 0;
    this.wallClingDir = 0;
    
    this.meleeCombo = 0;
    this.meleeTimer = 0;
    this.meleeCooldown = 0;
    
    this.shootCooldown = 0;
    this.chargeTimer = 0;

    this.auraPhase = 0;
    this.cloakPhase = 0;
    this.groundPoundActive = false;

    this.gravHoldMode = saveData.settings.gravFlipHold === 'HOLD TO FLIP';
  }

  hasUpgrade(name) { return this.upgrades.includes(name); }

  update(dt, engine) {
    super.update(dt, engine);
    if(this.isDead) return;

    this._handleInput(dt, engine);
    this._updateEnergy(dt);
    
    this.auraPhase += dt * Math.PI; // 2s cycle approx
    this.cloakPhase += dt * 5;

    // Dash logic
    if (this.dashTimer > 0) {
      this.dashTimer -= dt;
      this.vx = PHYSICS.dashSpeed * this.facingDir;
      this.vy = 0;
      engine.particles.emitDashTrail(this.x + this.width/2, this.y + this.height/2, this.facingDir);
      if (this.dashTimer <= 0) this.vx = 0; // stop dash
    }
    if (this.dashCooldown > 0) this.dashCooldown -= dt;

    if (this.meleeCooldown > 0) this.meleeCooldown -= dt;
    if (this.meleeTimer > 0) {
        this.meleeTimer -= dt;
        if(this.meleeTimer <= 0) this.meleeCombo = 0; // reset combo window
    }

    if (this.shootCooldown > 0) this.shootCooldown -= dt;

    if (this.iframeTimer > 0) {
       // flicker managed in draw
    }
  }

  _handleInput(dt, engine) {
    const input = engine.input;
    if(this.dashTimer > 0) return; // Cant act during dash

    // Horizontal Move
    let moveDir = 0;
    if (input.isDown('ArrowLeft')) { moveDir = -1; this.facingDir = -1; }
    if (input.isDown('ArrowRight')) { moveDir = 1; this.facingDir = 1; }

    if (moveDir !== 0) {
      this.vx += moveDir * PHYSICS.playerAccel * dt;
      engine.idd.recordDistance(Math.abs(this.vx * dt));
    } else {
      // Decelerate
      if (this.vx > 0) {
        this.vx -= PHYSICS.playerDecel * dt;
        if (this.vx < 0) this.vx = 0;
      } else if (this.vx < 0) {
        this.vx += PHYSICS.playerDecel * dt;
        if (this.vx > 0) this.vx = 0;
      }
    }

    // Clamp speed unless dashing
    if (this.vx > PHYSICS.playerWalkSpeed) this.vx = PHYSICS.playerWalkSpeed;
    if (this.vx < -PHYSICS.playerWalkSpeed) this.vx = -PHYSICS.playerWalkSpeed;

    // Wall cling
    this.wallClingDir = 0;
    if (!this.onGround && this.touchingWall !== 0 && moveDir === this.touchingWall) {
      this.wallClingDir = this.touchingWall;
    }

    // Gravity Flip
    if (this.gravHoldMode) {
       let wantFlipped = input.isDown('Space') || input.isDown('ArrowUp');
       if(wantFlipped !== this.gravityFlipped) this._doFlip(engine);
    } else {
       if (input.isJustPressed('Space') || input.isJustPressed('ArrowUp')) {
         this._doFlip(engine);
       }
    }

    // Ground Pound
    if (!this.onGround && input.isJustPressed('ArrowDown')) {
      this.groundPoundActive = true;
      this.vy = this.gravityFlipped ? -900 : 900;
    }

    // Dash
    if (input.isJustPressed('KeyC') && this.dashCooldown <= 0 && this.energy >= 20) {
      this.energy -= 20;
      this.dashTimer = 0.12;
      this.dashCooldown = this.hasUpgrade('Shadow Step') ? 0.5 : 0.8;
      engine.idd.recordDash();
    }

    // Melee (Z)
    if (input.isJustPressed('KeyZ') && this.meleeCooldown <= 0) {
      this._doMelee(engine);
    }

    // Ranged (X) Auto-fire or charge
    if (input.isDown('KeyX')) {
      this.chargeTimer += dt;
      if(this.chargeTimer > 1.5 && !this.chargeSound) {
         this.chargeSound = engine.audio.sfx_chargedBlastCharge(220, 880, 1500);
      }
      
      // Auto-fire checks
      if (this.hasUpgrade('Void Resonance Core') && this.chargeTimer < 0.2 && this.shootCooldown <= 0) {
          // If we want auto fire, we need continuous logic here. 
          // For simplicity, tapping vs holding - just map auto fire cleanly
          if(this.energy >= 8) this._fireVoidBolt(engine);
      }
    } else {
      if (this.chargeTimer >= 1.5) {
         // Release charged blast
         this._fireChargedBlast(engine);
      } else if (input.isJustReleased('KeyX')) {
         if(this.energy >= 8 && this.shootCooldown <= 0) this._fireVoidBolt(engine);
      }
      this.chargeTimer = 0;
      this.chargeSound = null;
    }
  }

  _doFlip(engine) {
    const cost = this.hasUpgrade('Gravity Mastery') ? 8 : 15;
    if (this.energy > 0) {
      this.energy = Math.max(0, this.energy - cost);
      this.gravityFlipped = !this.gravityFlipped;
      this.vy = 0;
      engine.particles.emitGravityFlip(this.x + this.width/2, this.y + this.height/2, this.gravityFlipped);
      engine.audio.sfx_gravityFlip();
      engine.idd.recordFlip();
      this.groundPoundActive = false; // Reset if flipping mid-pound
    } else {
      // Out of energy flash
      engine.ui.showNotification("ENERGY DEPLETED", '#FF0000', 1.0);
      engine.audio.sfx_gravityLocked();
    }
  }

  _doMelee(engine) {
    this.meleeCombo++;
    if(this.meleeCombo > 3) this.meleeCombo = 1;
    this.meleeTimer = this.hasUpgrade('Combo Extender') ? 0.6 : 0.4;
    this.meleeCooldown = 0.35;
    
    const dmg = this.hasUpgrade('Blade Sharpness') ? 40 : 25;
    const finalDmg = this.meleeCombo === 3 ? dmg * 2 : dmg;

    engine.audio.sfx_meleeSwing();
    
    // Spawn melee hitbox & particles
    // ... we can handle hitbox logic directly checking enemies here
    let cx = this.x + this.width/2 + (this.facingDir * 30);
    let cy = this.y + this.height/2;

    engine.particles.emitMeleeSlash(cx, cy, this.facingDir, this.gravityFlipped);

    const hitRect = {
       x: this.facingDir > 0 ? this.x : this.x - 45,
       y: this.y - 10,
       width: 45 + this.width,
       height: this.height + 20
    };

    let hitAnything = false;
    // Check destructibles
    engine.world.breakTiles(hitRect);

    // Check enemies
    for(let e of engine.entities) {
      if(!e.isPlayer && !e.isDead && !e.isProjectile) {
        if(CollisionEngine.checkAABB(hitRect, e)) {
           if(e.takeDamage(finalDmg, this.facingDir, engine)) {
               engine.particles.emitBulletHit(e.x + e.width/2, e.y + e.height/2);
               engine.idd.recordDamageDealt(finalDmg);
               hitAnything = true;
           }
        }
      }
    }
    
    if(hitAnything) engine.audio.sfx_meleeHit();
  }

  _fireVoidBolt(engine) {
    this.energy -= 8;
    this.shootCooldown = this.hasUpgrade('Rapid Fire') ? 0.22 : 0.3;
    
    let vx = 550 * this.facingDir;
    let vy = 0;
    if(engine.input.isDown('ArrowUp')) vy = this.gravityFlipped ? 550 : -550;
    if(engine.input.isDown('ArrowDown')) vy = this.gravityFlipped ? -550 : 550;
    
    if(vy !== 0) vx = 550 * 0.707 * this.facingDir; // normalize diag

    const dmg = this.hasUpgrade('Void Amplifier') ? 26 : 18;
    engine.spawnProjectile(true, this.x + this.width/2, this.y + this.height/2, vx, vy, dmg, 1.2, false);
    engine.audio.sfx_voidBolt();
  }

  _fireChargedBlast(engine) {
    if (this.energy < 40) return;
    this.energy -= 40;
    let vx = 300 * this.facingDir;
    let vy = 0; // standard horizontal usually for charged
    
    const dmg = this.hasUpgrade('Singularity Overload') ? 130 : 90;
    engine.spawnProjectile(true, this.x + this.width/2, this.y + this.height/2, vx, vy, dmg, 3.0, true);
    engine.audio.sfx_chargedBlastFire();
  }

  _updateEnergy(dt) {
    const isRegenSlow = this.dashTimer > 0 || this.chargeTimer > 0;
    const rate = (isRegenSlow ? 6 : 12) + (this.hasUpgrade('Energy Regen+') ? 5 : 0);
    this.energy = Math.min(this.maxEnergy, this.energy + rate * dt);
  }

  updateStateAfterCollision() {
    if(this.groundPoundActive && this.onGround) {
      this.groundPoundActive = false;
      window.gameEngine.camera.addShake(5, 0.2);
      window.gameEngine.particles.emitGroundPound(this.x+14, this.gravityFlipped?this.y:this.y+48, this.gravityFlipped);
      window.gameEngine.audio.sfx_meleeHit(); // Reutilize thud
      // DMG to enemies
      for(let e of window.gameEngine.entities) {
         if(!e.isPlayer && !e.isDead && !e.isProjectile) {
            let dx = (e.x) - (this.x);
            let dy = (e.y) - (this.y);
            if (dx*dx+dy*dy < 80*80) { // 80px radius
               e.takeDamage(15, Math.sign(dx), window.gameEngine);
            }
         }
      }
    }
  }

  takeDamage(amt, knockbackDir, engine) {
    if(this.dashTimer > 0) return false; // iframe during dash
    if(super.takeDamage(amt, knockbackDir, engine)){
      engine.camera.addShake(8, 0.3);
      engine.audio.sfx_playerHurt();
      engine.idd.recordDamageTaken(amt);
      return true;
    }
    return false;
  }

  die(engine) {
    super.die(engine);
    engine.particles.emitEnemyDeath(this.x+14, this.y+24, '#1a0a2a');
    engine.audio.sfx_playerDeath();
    engine.idd.recordDeath();
    engine.triggerGameOver();
  }

  draw(ctx) {
    if (this.iframeTimer > 0 && Math.floor(this.iframeTimer * 10) % 2 === 0) return; // FLicker

    ctx.save();
    ctx.translate(this.x + this.width/2, this.y + this.height/2);
    if(this.gravityFlipped) ctx.scale(1, -1);
    if(this.facingDir === -1) ctx.scale(-1, 1);

    // Aura
    let op = 0.6 + Math.sin(this.auraPhase)*0.4;
    let radGrad = ctx.createRadialGradient(0, 0, 5, 0, 0, 40);
    const radColor = this.gravityFlipped ? '0, 255, 255' : '170, 0, 255';
    radGrad.addColorStop(0, `rgba(${radColor}, ${op})`);
    radGrad.addColorStop(1, `rgba(${radColor}, 0)`);
    ctx.fillStyle = radGrad;
    ctx.beginPath(); ctx.arc(0, 0, 40, 0, Math.PI*2); ctx.fill();

    // Body
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(-14, -24, 28, 48);

    // Hood Eye
    ctx.fillStyle = '#AA00FF';
    ctx.fillRect(4, -16, 2, 2);

    // Cloak wave
    ctx.fillStyle = '#1a0a2a';
    ctx.beginPath();
    ctx.moveTo(-18, -10);
    ctx.lineTo(18, -10);
    ctx.lineTo(18, 24);
    // wave bottom
    for(let i=18; i>=-18; i-=4){
       ctx.lineTo(i, 24 + Math.sin(this.cloakPhase + i)*4);
    }
    ctx.closePath();
    ctx.fill();
    
    // Charged visual
    if(this.chargeTimer > 0) {
       let chargeProg = Math.min(this.chargeTimer / 1.5, 1.0);
       let cr = 8 + 16 * chargeProg;
       ctx.fillStyle = chargeProg >= 1.0 ? '#FFFFFF' : '#00FFFF';
       ctx.globalAlpha = 0.5 + 0.5*chargeProg;
       ctx.beginPath(); ctx.arc(10, 0, cr, 0, Math.PI*2); ctx.fill();
       ctx.globalAlpha = 1.0;
    }

    ctx.restore();
  }
}

// Map generator helper - since hand-crafting 5 arrays of 80x22 is very large,
// we will programmatically construct sensible layouts that meet the prompt's structural demands.
class World {
  constructor() {
    this.width = 160; 
    this.height = 22;
    this.tiles = [];
    this.zoneId = 1;
    this.activeBoss = null;
    this.collectibles = [];
  }

  getZoneName() {
    switch(this.zoneId) {
      case 1: return "DOCKING BAY OMEGA";
      case 2: return "REACTOR CORE";
      case 3: return "CRYOGENIC VAULTS";
      case 4: return "NEURAL NETWORK";
      case 5: return "NEXUS-7 THRONE";
      default: return "UNKNOWN";
    }
  }

  loadZone(zoneId, engine) {
    this.zoneId = zoneId;
    this.tiles = [];
    this.collectibles = [];
    this.activeBoss = null;
    
    // Clear entities
    engine.entities = [];

    // Basic map generation layout (80x22 or 160x22 for more space)
    for (let y = 0; y < this.height; y++) {
      let row = [];
      for (let x = 0; x < this.width; x++) {
        row.push(0); 
      }
      this.tiles.push(row);
    }

    // Build floor and ceiling bounds
    for (let x = 0; x < this.width; x++) {
      this.tiles[0][x] = 1;
      this.tiles[this.height - 1][x] = 1;
    }
    for (let y = 0; y < this.height; y++) {
      this.tiles[y][0] = 1;
      this.tiles[y][this.width - 1] = 1;
    }

    this._generatePlatformsAndHazards();
    this._spawnEntities(engine);

    // Force Boss Room (Starts at x=130)
    for(let y=1; y<this.height-1; y++){
       this.tiles[y][125] = 1; // Boss door
    }
    // Boss room 
    const bossType = ['Sentinel', 'Leviathan', 'Phantom', 'Warden', 'Nexus7'][this.zoneId-1];
    
    // Zone 1 exit portal logic is tied to boss death, handled in boss class

    engine.renderer.cacheMap(this);
  }

  getTile(x, y) {
    if (x < 0 || x >= this.width || y < 0 || y >= this.height) return 1; // out of bounds is solid
    return this.tiles[y][x];
  }

  setTile(x, y, v) {
    if (x >= 0 && x < this.width && y >= 0 && y < this.height) {
      this.tiles[y][x] = v;
    }
  }

  breakTiles(rect) {
    const ts = CONSTANTS.TILE_SIZE;
    const startX = Math.floor(rect.x / ts);
    const endX = Math.floor((rect.x + rect.width) / ts);
    const startY = Math.floor(rect.y / ts);
    const endY = Math.floor((rect.y + rect.height) / ts);
    
    let broken = false;
    for (let y = startY; y <= endY; y++) {
      for (let x = startX; x <= endX; x++) {
        if (this.getTile(x, y) === 8) { // destructible
          this.setTile(x, y, 0); // break
          window.gameEngine.particles.emitExplosion(x*ts+16, y*ts+16, 16, 0.5);
          broken = true;
        }
      }
    }
    if(broken) window.gameEngine.renderer.cacheMap(this); // recache
  }

  _generatePlatformsAndHazards() {
    // Generate different architectural styles based on zoneId
    const ts = CONSTANTS.TILE_SIZE;
    
    if (this.zoneId === 1) {
      // Zone 1: Docking Bay - Wide open platforms, easy introductory level
      for (let i = 10; i < 110; i += 15) {
         let width = 6 + Math.floor(Math.random() * 5);
         let py = 15 - Math.floor(Math.random() * 4);
         for(let x=i; x<i+width; x++) {
            this.setTile(x, py, 1);
            if(Math.random() > 0.8) this.setTile(x, py-1, 2); // Occasional spike
         }
         // Add some mid-air platforms
         let midWidth = 4 + Math.floor(Math.random() * 3);
         let midY = 8 + Math.floor(Math.random() * 4);
         for(let x=i; x<i+midWidth; x++) {
            this.setTile(x + 5, midY, 7); // One-way platforms
         }
      }
    } 
    else if (this.zoneId === 2) {
      // Zone 2: Reactor Core - Hazardous bottom, lots of jumping required
      
      // Bottom layer is mostly energy drain or spikes, requiring high ground/gravity usage
      for(let x=10; x<120; x++) {
         if(Math.random() > 0.3 && this.getTile(x, 20) === 0) {
            this.setTile(x, 20, 2); // Spikes on floor
         }
      }

      for (let i = 10; i < 115; i += 10) {
         let w = 2 + Math.floor(Math.random()*3); // Narrow platforms
         let py = 12 + Math.floor(Math.random()*6); // Random altitudes
         for(let x=i; x<i+w; x++) {
            this.setTile(x, py, 1);
         }
         // High ceiling platforms
         let cw = 3 + Math.floor(Math.random()*3);
         let cy = 4 + Math.floor(Math.random()*4);
         for(let x=i+4; x<i+4+cw; x++) {
            this.setTile(x, cy, 1);
            // Spikes on bottom of high platforms
            if(Math.random() > 0.5) this.setTile(x, cy+1, 3);
         }
      }
    } 
    else if (this.zoneId === 3) {
      // Zone 3: Cryo Vaults - Enclosed ice corridors
      for (let i = 10; i < 110; i += 20) {
         // Create tunnel/corridor walls
         for(let y=4; y<18; y++) {
            if(y > 7 && y < 14) continue; // Gap
            this.setTile(i, y, 5); // Ice wall
         }
         
         // Inner platforms
         for(let x=i+4; x<i+16; x++) {
            if (x % 3 === 0) continue; // break up the floors
            this.setTile(x, 7, 5); // Ice floor top
            this.setTile(x, 14, 5); // Ice floor bottom
         }

         // Add some breakable shortcuts
         this.setTile(i, 10, 8);
         this.setTile(i, 11, 8);
      }
    }
    else if (this.zoneId === 4) {
      // Zone 4: Neural Network - Vertical pillars and data bridges
      for (let i = 20; i < 120; i += 12) {
         let isPillar = Math.random() > 0.5;
         if (isPillar) {
            let gapY = 8 + Math.floor(Math.random() * 6);
            for(let y=1; y<21; y++) {
               if(y > gapY && y < gapY + 5) continue; // Gap to pass through
               this.setTile(i, y, 1);
               this.setTile(i+1, y, 1); // 2-wide pillar
               
               // Data hazards
               if(y === gapY || y === gapY+5) {
                 this.setTile(i, gapY, 3); // Down spike
                 this.setTile(i, gapY+5, 2); // Up spike
               }
            }
         } else {
            // Bridges
            let py = 4 + Math.floor(Math.random() * 12);
            for(let x=i-5; x<i+8; x++) {
               this.setTile(x, py, 7); // Data bridges
            }
         }
      }
    }
    else {
      // Zone 5: NEXUS Throne - Chaos and symmetry
      for (let i = 15; i < 120; i += 25) {
         // Create diamond shapes
         let cy = 10;
         for(let o=0; o<5; o++) {
            this.setTile(i + o, cy + o, 1);
            this.setTile(i + o, cy - o, 1);
            this.setTile(i - o, cy + o, 1);
            this.setTile(i - o, cy - o, 1);
         }
         // Floaters
         for(let x=i+10; x<i+15; x++) {
            this.setTile(x, 5, 8); // Breakable
            this.setTile(x, 15, 8); 
         }
      }
    }
    
    // Checkpoints (Always valid ground)
    this.setTile(60, this.height-2, 9);
    this.setTile(120, this.height-2, 9);
  }

  _spawnEntities(engine) {
     engine.entities.push(new UpgradeTerminal(15 * CONSTANTS.TILE_SIZE, (this.height-2)*CONSTANTS.TILE_SIZE - 40));

     for(let i=0; i<15; i++) {
        let px = 20 + Math.floor(Math.random() * 100);
        let py = 5 + Math.floor(Math.random() * 12);
        
        // Find ground
        while(this.getTile(px, py) === 0 && py < this.height-2) py++;
        
        let type = Math.random();
        if(type < 0.3) engine.entities.push(new DroneEnemy(px*CONSTANTS.TILE_SIZE, (py-3)*CONSTANTS.TILE_SIZE));
        else if (type < 0.6) engine.entities.push(new GuardEnemy(px*CONSTANTS.TILE_SIZE, (py)*CONSTANTS.TILE_SIZE - 44));
        else if (type < 0.8) engine.entities.push(new HunterEnemy(px*CONSTANTS.TILE_SIZE, (py)*CONSTANTS.TILE_SIZE - 38));
        else engine.entities.push(new TurretEnemy(px*CONSTANTS.TILE_SIZE, (py)*CONSTANTS.TILE_SIZE - 20));
     }

     for(let i=0; i<30; i++) {
        let px = 10 + Math.floor(Math.random() * 110);
        let py = 2 + Math.floor(Math.random() * 16);
        engine.entities.push(new Coin(px*CONSTANTS.TILE_SIZE, py*CONSTANTS.TILE_SIZE));
     }

     for(let i=0; i<2; i++) {
       let px = 50 + Math.floor(Math.random() * 70);
       let py = 2 + Math.floor(Math.random() * 16);
       engine.entities.push(new Crystal(px*CONSTANTS.TILE_SIZE, py*CONSTANTS.TILE_SIZE));
     }

     for(let i=0; i<3; i++) {
       let px = 40 + Math.floor(Math.random() * 80);
       let py = 2 + Math.floor(Math.random() * 16);
       engine.entities.push(new HealthPickup(px*CONSTANTS.TILE_SIZE, py*CONSTANTS.TILE_SIZE));
     }

     // Spawn Boss
     if(this.zoneId === 1) this.activeBoss = new BossSentinel(140 * CONSTANTS.TILE_SIZE, (this.height-2)*CONSTANTS.TILE_SIZE - 120);
     if(this.zoneId === 2) this.activeBoss = new BossLeviathan(140 * CONSTANTS.TILE_SIZE, (this.height/2)*CONSTANTS.TILE_SIZE);
     if(this.zoneId === 3) this.activeBoss = new BossPhantom(140 * CONSTANTS.TILE_SIZE, (this.height/2)*CONSTANTS.TILE_SIZE);
     if(this.zoneId === 4) this.activeBoss = new BossWarden(140 * CONSTANTS.TILE_SIZE, (this.height/2)*CONSTANTS.TILE_SIZE);
     if(this.zoneId === 5) this.activeBoss = new BossNexus7(140 * CONSTANTS.TILE_SIZE, (this.height-2)*CONSTANTS.TILE_SIZE - 180);
     
     if (this.activeBoss) engine.entities.push(this.activeBoss);
  }

  drawStaticTiles(ctx) {
     const ts = CONSTANTS.TILE_SIZE;
     const colors = this._getZoneColors();

     for (let y = 0; y < this.height; y++) {
        for (let x = 0; x < this.width; x++) {
           let t = this.tiles[y][x];
           if (t === 0) continue;
           
           if (t === 1) { // Solid
              ctx.fillStyle = colors.mainTile;
              ctx.fillRect(x*ts, y*ts, ts, ts);
              ctx.strokeStyle = colors.accentTile;
              ctx.strokeRect(x*ts, y*ts, ts, ts);
           } else if (t === 5) { // Ice
              ctx.fillStyle = 'rgba(200, 255, 255, 0.7)';
              ctx.fillRect(x*ts, y*ts, ts, ts);
           } else if (t === 7) { // One Way
              ctx.fillStyle = colors.mainTile;
              ctx.fillRect(x*ts, y*ts, ts, ts/3);
           } else if (t === 8) { // Destructible
              ctx.fillStyle = '#555555';
              ctx.fillRect(x*ts, y*ts, ts, ts);
              ctx.strokeStyle = '#222222';
              ctx.beginPath(); ctx.moveTo(x*ts, y*ts); ctx.lineTo(x*ts+ts, y*ts+ts); ctx.stroke();
           } else if (t === 9) { // Checkpoint
              ctx.fillStyle = '#00AA00';
              ctx.beginPath(); ctx.arc(x*ts+16, y*ts+16, 12, 0, Math.PI*2); ctx.fill();
           }
        }
     }
  }

  drawDynamicTiles(ctx) {
     const ts = CONSTANTS.TILE_SIZE;
     // Draw spikes and damage areas separate since they might be grouped or glowing
     for (let y = 0; y < this.height; y++) {
        for (let x = 0; x < this.width; x++) {
           let t = this.tiles[y][x];
           if(t === 2) { // Spike up
              ctx.fillStyle = '#FF0000';
              ctx.beginPath();
              ctx.moveTo(x*ts, y*ts+ts); ctx.lineTo(x*ts+ts/2, y*ts); ctx.lineTo(x*ts+ts, y*ts+ts); ctx.fill();
           } else if(t === 3) { // Spike down
              ctx.fillStyle = '#FF0000';
              ctx.beginPath();
              ctx.moveTo(x*ts, y*ts); ctx.lineTo(x*ts+ts/2, y*ts+ts); ctx.lineTo(x*ts+ts, y*ts); ctx.fill();
           } else if (t === 10) { // Portal
              ctx.strokeStyle = '#00FFFF';
              ctx.lineWidth = 4;
              ctx.beginPath(); ctx.arc(x*ts+16, y*ts+16, 32 + Math.sin(Date.now()/200)*8, 0, Math.PI*2); ctx.stroke();
           }
        }
     }
  }

  drawFlatBackground(ctx) {
     ctx.fillStyle = this._getZoneColors().bg;
     ctx.fillRect(0,0,CONSTANTS.WIDTH,CONSTANTS.HEIGHT);
  }

  drawBackground(ctx, camera) {
     const colors = this._getZoneColors();
     ctx.fillStyle = colors.bg;
     ctx.fillRect(0, 0, CONSTANTS.WIDTH, CONSTANTS.HEIGHT);

     if(this.zoneId === 1) {
        ctx.fillStyle = '#223344';
        let offset = -(camera.x * 0.2) % 200;
        for(let i=0; i<10; i++) {
           ctx.fillRect(offset + i*200, 100, 50, CONSTANTS.HEIGHT);
        }
     } else if (this.zoneId === 2) {
        ctx.fillStyle = '#441100';
        let offset = -(camera.x * 0.4) % 300;
        for(let i=0; i<10; i++) {
           ctx.beginPath(); ctx.arc(offset + i*300, CONSTANTS.HEIGHT, 200, 0, Math.PI); ctx.fill();
        }
     }
     // Apply generic parallax blocks
     ctx.fillStyle = 'rgba(0,0,0,0.3)';
     let pOffset = -(camera.x * 0.5) % 400;
     for(let i=-1; i<5; i++) {
        ctx.fillRect(pOffset + i*400, 300, 150, 400);
     }
  }

  _getZoneColors() {
     switch(this.zoneId) {
        case 1: return { mainTile: '#2A2A35', accentTile: '#00FFFF', bg: '#0A0A15' };
        case 2: return { mainTile: '#331100', accentTile: '#FF4400', bg: '#1A0500' };
        case 3: return { mainTile: '#DDFFFF', accentTile: '#00AAAA', bg: '#001A22' };
        case 4: return { mainTile: '#110022', accentTile: '#00FF00', bg: '#050011' };
        case 5: return { mainTile: '#111111', accentTile: '#FF0000', bg: '#000000' };
        default: return { mainTile: '#555555', accentTile: '#FFFFFF', bg: '#000000' };
     }
  }
}
