class Projectile extends Entity {
  constructor(isPlayer, x, y, vx, vy, dmg, lifetime, pierce=false) {
     super(x, y, 12, 4);
     this.isPlayerProj = isPlayer;
     this.vx = vx; this.vy = vy;
     this.dmg = dmg;
     this.lifetime = lifetime;
     this.isProjectile = true;
     this.pierceCount = pierce ? 3 : 0;
     this.isGravityImmune = true; // bullets don't fall usually
     
     if(pierce) { this.width = 30; this.height = 30; }
  }

  update(dt, engine) {
     super.update(dt, engine);
     this.x += this.vx * dt;
     this.y += this.vy * dt;
     this.lifetime -= dt;

     if(this.lifetime <= 0) {
        this.die();
        return;
     }

     // Emit trail
     if(this.isPlayerProj && this.pierceCount > 0) {
        engine.particles.emitExplosion(this.x+15, this.y+15, 5, 0.1); 
     } else {
        if(Math.random() > 0.5) engine.particles.emitBulletHit(this.x+6, this.y+2);
     }

     // Tile collision
     const ts = CONSTANTS.TILE_SIZE;
     const tx = Math.floor(this.x/ts);
     const ty = Math.floor(this.y/ts);
     const t = engine.world.getTile(tx, ty);
     if(t === 1 || t === 5 || t === 8) {
        if(t === 8) engine.world.breakTiles({x: this.x, y: this.y, width: this.width, height: this.height});
        engine.particles.emitBulletHit(this.x, this.y);
        this.die();
        return;
     }

     // Entity collision
     for(let e of engine.entities) {
        if(e.isDead || e.isProjectile) continue;
        if(this.isPlayerProj && !e.isPlayer && CollisionEngine.checkAABB(this, e)) {
           e.takeDamage(this.dmg, Math.sign(this.vx), engine);
           engine.particles.emitBulletHit(this.x, this.y);
           if(this.pierceCount > 0) {
              this.pierceCount--;
           } else {
              this.die();
              return;
           }
        } 
        else if (!this.isPlayerProj && e.isPlayer && CollisionEngine.checkAABB(this, e)) {
           if(e.takeDamage(this.dmg, Math.sign(this.vx), engine)) {
              this.die();
              return; 
           }
        }
     }
  }

  draw(ctx) {
     ctx.fillStyle = this.isPlayerProj ? (this.pierceCount > 0 ? '#FFFFFF' : '#00FFFF') : '#FF0000';
     if(this.pierceCount > 0) {
        ctx.beginPath(); ctx.arc(this.x+15, this.y+15, 15, 0, Math.PI*2); ctx.fill();
     } else {
        ctx.fillRect(this.x, this.y, this.width, this.height);
     }
  }
}

// ================= COLLECTIBLES ================= //
class Collectible extends Entity {
  constructor(x, y, w, h) {
     super(x, y, w, h);
     this.isGravityImmune = true;
     this.collected = false;
     this.baseY = y;
     this.time = Math.random() * 10;
  }
  update(dt, engine) {
     this.time += dt;
     this.y = this.baseY + Math.sin(this.time * 2) * 8; // Float animation
     if(CollisionEngine.checkAABB_expanded(this, engine.player, 8)) {
        this.onCollect(engine);
        this.isDead = true;
     }

     if(engine.player.hasUpgrade('Crystal Magnet')) {
        let dx = engine.player.x - this.x;
        let dy = engine.player.y - this.y;
        let dist = Math.sqrt(dx*dx+dy*dy);
        if(dist < 60) {
           this.x += (dx/dist) * 200 * dt;
           this.y += (dy/dist) * 200 * dt;
           this.baseY = this.y; // Override float
        }
     }
  }
}

class Coin extends Collectible {
  constructor(x, y) { super(x, y, 16, 16); this.color = '#FFD700'; }
  onCollect(engine) {
     engine.player.coins += 1;
     engine.particles.emitCoinCollect(this.x, this.y);
     engine.audio.sfx_coinCollect();
  }
  draw(ctx) {
     ctx.fillStyle = this.color;
     ctx.beginPath(); ctx.arc(this.x+8, this.y+8, 8 * Math.abs(Math.sin(this.time*3)), 0, Math.PI*2); ctx.fill();
  }
}

class Crystal extends Collectible {
  constructor(x, y) { super(x, y, 16, 16); this.color = '#00FFFF'; }
  onCollect(engine) {
     engine.player.crystals += 1;
     engine.player.energy = Math.min(engine.player.maxEnergy, engine.player.energy + 30);
     engine.particles.emitCrystalCollect(this.x, this.y);
     engine.audio.sfx_crystalCollect();
  }
  draw(ctx) {
     ctx.fillStyle = this.color;
     engine.particles._drawStar(ctx, this.x+8, this.y+8, 6, 8, 4);
  }
}

class HealthPickup extends Collectible {
  constructor(x, y) { super(x, y, 16, 16); this.color = '#FF0000'; }
  onCollect(engine) {
     engine.player.hp = Math.min(engine.player.maxHp, engine.player.hp + 40);
     engine.audio.sfx_crystalCollect(); // reuse
  }
  draw(ctx) {
     ctx.fillStyle = this.color;
     ctx.fillRect(this.x+6, this.y, 4, 16);
     ctx.fillRect(this.x, this.y+6, 16, 4);
  }
}

// ================= ENEMIES ================= //
class Enemy extends Entity {
  constructor(x, y, w, h, hp, spd, dmg) {
     super(x, y, w, h);
     this.maxHp = this.hp = hp;
     this.speed = spd;
     this.dmg = dmg;
     this.state = 'PATROL';
     this.stateTimer = 0;
     this.playerDist = 9999;
  }
  update(dt, engine) {
     super.update(dt, engine);
     if(this.isDead) return;
     const p = engine.player;
     this.playerDist = Math.sqrt(Math.pow(this.x - p.x, 2) + Math.pow(this.y - p.y, 2));

     if(this.state === 'ALERT') {
       this.stateTimer -= dt;
       if(this.stateTimer <= 0) this.state = 'CHASE';
     }

     if(this.iframeTimer > 0 && Math.floor(this.iframeTimer*10)%2 === 0) return; // Flash
  }
  die(engine) {
     super.die(engine);
     engine.particles.emitEnemyDeath(this.x+this.width/2, this.y+this.height/2, this.color);
     engine.audio.sfx_enemyDeath();
     // Drop coins
     let amt = 3 + Math.floor(Math.random()*5);
     for(let i=0; i<amt; i++) engine.entities.push(new Coin(this.x, this.y));
  }
  drawObj(ctx) {} // Override
  draw(ctx) {
     if (this.iframeTimer > 0 && Math.floor(this.iframeTimer * 10) % 2 === 0) {
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(this.x, this.y, this.width, this.height);
        return;
     }

     this.drawObj(ctx);

     // health bar
     if(this.hp < this.maxHp) {
        ctx.fillStyle = '#000'; ctx.fillRect(this.x, this.y-10, this.width, 4);
        ctx.fillStyle = '#F00'; ctx.fillRect(this.x, this.y-10, this.width * (this.hp/this.maxHp), 4);
     }
     if(this.state === 'ALERT') {
        ctx.fillStyle = '#FF0'; ctx.font = '16px Arial'; ctx.fillText('!', this.x+this.width/2-4, this.y-15);
     }
  }
}

class DroneEnemy extends Enemy {
  constructor(x, y) {
     super(x, y, 20, 20, 30, 140, 10);
     this.isGravityImmune = true;
     this.color = '#555555';
     this.baseY = y; this.time = 0;
  }
  update(dt, engine) {
     super.update(dt, engine);
     if(this.isDead) return;
     
     let hpMod = engine.idd.enemyHpMod;
     let spdMod = engine.idd.enemySpeedMod;

     this.time += dt;
     if(this.state === 'PATROL') {
        this.x += Math.sin(this.time) * this.speed * spdMod * dt;
        this.y = this.baseY + Math.sin(this.time*2) * 20;
        if(this.playerDist < 180) { this.state = 'ALERT'; this.stateTimer = 0.5; engine.audio.sfx_enemyAlert(); }
     } else if (this.state === 'CHASE') {
        let dx = engine.player.x - this.x;
        let dy = engine.player.y - this.y;
        let dist = Math.sqrt(dx*dx+dy*dy);
        if(dist > 50) {
           this.x += (dx/dist) * this.speed * spdMod * dt;
           this.y += (dy/dist) * this.speed * spdMod * dt;
        } else {
           // Attack
           if(this.stateTimer <= 0) {
              this.stateTimer = 1.5;
              engine.spawnProjectile(false, this.x+10, this.y+10, (dx/dist)*300, (dy/dist)*300, this.dmg, 2.0, false);
           }
        }
        if(this.stateTimer > 0) this.stateTimer -= dt;
     }

     if(CollisionEngine.checkAABB(this, engine.player)) engine.player.takeDamage(10, Math.sign(engine.player.x-this.x), engine);
  }
  drawObj(ctx) {
     ctx.fillStyle = this.color;
     ctx.beginPath(); ctx.arc(this.x+10, this.y+10, 10, 0, Math.PI*2); ctx.fill();
     ctx.fillStyle = '#F00';
     ctx.beginPath(); ctx.arc(this.x+10, this.y+10, 3, 0, Math.PI*2); ctx.fill();
  }
}

class GuardEnemy extends Enemy {
  constructor(x, y) {
     super(x, y, 24, 44, 60, 90, 20);
     this.color = '#444455';
     this.walkDir = 1;
  }
  update(dt, engine) {
     super.update(dt, engine);
     if(this.state === 'PATROL') {
        this.vx = this.speed * this.walkDir * engine.idd.enemySpeedMod;
        if(this.touchingWall !== 0) this.walkDir *= -1;
        if(this.playerDist < 200) { this.state = 'ALERT'; this.stateTimer = 0.5; engine.audio.sfx_enemyAlert(); }
     } else if (this.state === 'CHASE') {
        let pDir = Math.sign(engine.player.x - this.x);
        if(this.playerDist > 140) {
           this.vx = this.speed * pDir * engine.idd.enemySpeedMod;
        } else {
           this.vx = 0;
           if(this.stateTimer <= 0) {
              this.stateTimer = 2.5;
              // Burst shot would be timed but simple 1 for now
              engine.spawnProjectile(false, this.x+12, this.y+20, pDir*320, 0, this.dmg, 2.0, false);
           }
        }
        if(this.stateTimer > 0) this.stateTimer -= dt;
     }
  }
  drawObj(ctx) {
     ctx.fillStyle = this.color;
     ctx.fillRect(this.x, this.y, this.width, this.height);
     // Helmet
     ctx.fillStyle = '#F00'; ctx.fillRect(this.x+4, this.y+4, this.width-8, 6);
  }
}

class HunterEnemy extends Enemy {
   constructor(x, y) {
      super(x, y, 20, 38, 45, 200, 30);
      this.color = '#222222';
      this.walkDir = 1;
   }
   update(dt, engine) {
      super.update(dt, engine);
      if(this.state === 'PATROL') {
         this.vx = this.speed * this.walkDir * engine.idd.enemySpeedMod;
         if(this.touchingWall !== 0) { this.walkDir *= -1; }
         if(this.playerDist < 250) { this.state = 'CHASE'; engine.audio.sfx_enemyAlert(); }
      } else if (this.state === 'CHASE') {
         let pDir = Math.sign(engine.player.x - this.x);
         this.vx = this.speed * pDir * engine.idd.enemySpeedMod;
         
         // Flip gravity to match player after some time
         if(this.gravityFlipped !== engine.player.gravityFlipped && Math.random() < 0.01) {
            this.gravityFlipped = engine.player.gravityFlipped;
         }

         if(CollisionEngine.checkAABB(this, engine.player)) {
            engine.player.takeDamage(this.dmg, pDir, engine);
            this.vx = -pDir * 200; // Bounce back
         }
      }
   }
   drawObj(ctx) {
      ctx.fillStyle = this.color;
      ctx.fillRect(this.x, this.y, this.width, this.height);
      ctx.fillStyle = '#FFF'; ctx.fillRect(this.x + (this.vx>0?14:2), this.y+8, 4, 2);
   }
}

class TurretEnemy extends Enemy {

class Scene {
   constructor(engine) { this.engine = engine; }
   enter() {}
   update(dt) {}
   draw(ctx) {}
   exit() {}
}

class MainMenuScene extends Scene {
   enter() { 
      this.engine.menuTime = 0; 
      this.engine.audio.playMusicMenu();
   }
   update(dt) {
      this.engine.menuTime += dt;
      const input = this.engine.input;
      const ui = this.engine.ui;

      if(input.isJustPressed('ArrowDown')) {
         ui.menuSelection = (ui.menuSelection + 1) % ui.mainMenuItems.length;
         this.engine.audio.sfx_uiSelect();
      }
      if(input.isJustPressed('ArrowUp')) {
         ui.menuSelection = (ui.menuSelection - 1 + ui.mainMenuItems.length) % ui.mainMenuItems.length;
         this.engine.audio.sfx_uiSelect();
      }

      // Skip greyed out continue
      if(ui.menuSelection === 1 && !localStorage.getItem('gravshift_save')) {
         if(input.isJustPressed('ArrowDown')) ui.menuSelection = 2;
         else if (input.isJustPressed('ArrowUp')) ui.menuSelection = 0;
      }

      // Mouse hover and click
      for(let i=0; i<ui.mainMenuItems.length; i++) {
         const y = 350 + i * 50;
         if(input.mouse.x > CONSTANTS.WIDTH/2 - 150 && input.mouse.x < CONSTANTS.WIDTH/2 + 150 &&
            input.mouse.y > y - 25 && input.mouse.y < y + 25) {
            
            // Avoid selecting greyed out continue
            if(i === 1 && !localStorage.getItem('gravshift_save')) continue;

            if(ui.menuSelection !== i) {
               ui.menuSelection = i;
               this.engine.audio.sfx_uiSelect();
            }

            if(input.isMouseJustPressed()) {
               this._executeMenu(ui.mainMenuItems[i]);
               return;
            }
         }
      }

      if(input.isJustPressed('Enter')) {
         this._executeMenu(ui.mainMenuItems[ui.menuSelection]);
      }
   }

   _executeMenu(action) {
         this.engine.audio.sfx_uiSelect();
         if(action === 'NEW GAME') {
            this.engine.saveManager.resetProgress();
            this.engine.loadZoneMode = 'NEW';
            this.engine.changeState(GAME_STATE.CUTSCENE);
         } else if (action === 'CONTINUE') {
            this.engine.loadZoneMode = 'CONTINUE';
            this.engine.changeState(GAME_STATE.GAMEPLAY); // Jump right in
         } else if (action === 'SETTINGS') {
            this.engine.changeState(GAME_STATE.SETTINGS);
         }
   }
}

class SettingsScene extends Scene {
   enter() { this.engine.ui.settingsSelection = 0; }
   update(dt) {
      const input = this.engine.input;
      
      // Simple mockup
      if(input.isJustPressed('Enter') || input.isJustPressed('Escape')) {
         this.engine.audio.sfx_uiBack();
         this.engine.saveManager.save();
         this.engine.particles.updateSettings(this.engine.saveManager.data.settings.particleQuality);
         this.engine.audio.updateVolumes();
         
         // return to prev 
         if(this.engine.prevState === GAME_STATE.PAUSED) this.engine.changeState(GAME_STATE.PAUSED);
         else this.engine.changeState(GAME_STATE.MAIN_MENU);
      }
   }
   draw(ctx) {
      ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0,0,CONSTANTS.WIDTH,CONSTANTS.HEIGHT);
      ctx.fillStyle = '#00FFFF'; ctx.font = '40px Arial'; ctx.textAlign='center';
      ctx.fillText("SETTINGS", CONSTANTS.WIDTH/2, 100);

      ctx.fillText("Press ENTER or ESCAPE to go back", CONSTANTS.WIDTH/2, 200);

   }
}

class CutsceneScene extends Scene {
   enter() { 
      this.timer = 0; 
      this.lines = this._getTextForZone(this.engine.saveManager.data.currentZone).split('|');
      this.lineIndex = 0;
      this.engine.audio.playMusicMenu();
   }
   update(dt) {
      this.timer += dt;
      if (this.timer > 0.8 && this.lineIndex < this.lines.length) {
         this.timer = 0;
         this.lineIndex++;
      }
      if(this.engine.input.isJustPressed('Enter')) {
         this.engine.changeState(GAME_STATE.GAMEPLAY);
      }
   }
   draw(ctx) {
      ctx.fillStyle = '#000000'; ctx.fillRect(0,0,CONSTANTS.WIDTH,CONSTANTS.HEIGHT);
      ctx.fillStyle = '#00FFFF'; ctx.font = '30px Arial'; ctx.textAlign='center';
      ctx.fillText(`ZONE ${this.engine.saveManager.data.currentZone}`, CONSTANTS.WIDTH/2, 150);
      
      ctx.fillStyle = '#FFFFFF'; ctx.font = '24px Arial';
      for(let i=0; i<this.lineIndex; i++) {
         ctx.fillText(this.lines[i], CONSTANTS.WIDTH/2, 250 + i*40);
      }

      if(this.lineIndex >= this.lines.length) {
         ctx.globalAlpha = 0.5 + 0.5*Math.sin(Date.now()/200);
         ctx.fillText("PRESS ENTER TO CONTINUE", CONSTANTS.WIDTH/2, CONSTANTS.HEIGHT - 100);
         ctx.globalAlpha = 1.0;
      }
   }
   _getTextForZone(zoneId) {
      switch(zoneId) {
         case 1: return "DOCKING BAY OMEGA — Station Entry Level|The bay is crawling with NEXUS-7's sentinels.|But they don't know what you can do yet.|The gravity is unstable here. Use it.";
         case 2: return "REACTOR CORE — The Station's Heart|The heat here is unbearable for most.|NEXUS-7's power flows through these walls.|Sever the connection. Shut down the core.";
         case 3: return "CRYOGENIC VAULTS — Long-Term Storage|Hundreds were frozen here. Waiting.|NEXUS-7 uses them as an army in reserve.|They will not wake today.";
         case 4: return "NEURAL NETWORK — NEXUS-7's Mind|This is where it thinks. Where it plans.|Destroy the neural pathways. Blind the machine.|One final room remains.";
         case 5: return "NEXUS-7 THRONE — The Core of Everything|I have been watching you, Wraith.|You cannot kill what was never alive.|   — NEXUS-7|End it.";
         default: return "VOID STATION KAEROS — Deep Space Quadrant 7|You were not meant to wake up here.|The station's anti-gravity core has been corrupted.|NEXUS-7 has turned this place into a prison.|You are The Wraith. And you do not stay imprisoned.";
      }
   }
}

class GameScene extends Scene {
   enter() {
      // Handled heavily by engine setup initially
   }
   update(dt) {
      const e = this.engine;
      
      if(e.input.isJustPressed('Escape') || e.input.isJustPressed('KeyP')) {
         e.changeState(GAME_STATE.PAUSED);
         return;
      }

      e.idd.update(dt, e.player);
      e.player.update(dt, e);
      
      // Update entities
      for(let i = e.entities.length-1; i>=0; i--) {
         let ent = e.entities[i];
         ent.update(dt, e);
         CollisionEngine.resolveTileCollisions(ent, e.world, dt);
         if(ent.isDead && (ent.iframeTimer || 0) <= 0) {
            e.entities.splice(i, 1);
         }
      }

      CollisionEngine.resolveTileCollisions(e.player, e.world, dt);
      
      // Pickup check, portal check
      const ts = CONSTANTS.TILE_SIZE;
      let tx = Math.floor((e.player.x + e.player.width/2)/ts);
      let ty = Math.floor((e.player.y + e.player.height/2)/ts);
      if(e.world.getTile(tx, ty) === 10) { // Portal
         if(e.world.zoneId === 5) {
            e.changeState(GAME_STATE.VICTORY);
         } else {
            e.saveManager.data.currentZone++;
            e.saveManager.save();
            e.changeState(GAME_STATE.CUTSCENE);
         }
      } else if (e.world.getTile(tx, ty) === 9) { // Checkpoint
         if(e.saveManager.data.checkpointX !== tx*ts || e.saveManager.data.checkpointY !== ty*ts - e.player.height){
            e.saveManager.data.checkpointX = tx*ts;
            e.saveManager.data.checkpointY = ty*ts - e.player.height;
            e.saveManager.save();
            e.ui.showNotification("CHECKPOINT SAVED", '#00FF00', 1.5);
            e.audio.sfx_checkpoint();
         }
      } else if (e.world.getTile(tx, ty) === 2 || e.world.getTile(tx, ty) === 3) {
         // Spike
         e.player.takeDamage(25, -e.player.facingDir, e); 
      }

      // Check boundaries death
      if (e.player.y > e.world.height * ts || e.player.y < -ts) {
         e.player.die(e);
      }
      
      // Particles
      e.particles.update(dt, e.player.gravityFlipped);
      e.particles.emitAmbient(e.world.zoneId, e.camera);

      // Camera
      e.camera.update(dt, e.player, e.world.width, e.world.height, e.saveManager.data.settings);

      // Boss trigger
      if(e.world.activeBoss && tx > 125 && !e.world.activeBoss.introPlayed && e.state !== GAME_STATE.BOSS_INTRO && e.world.activeBoss.phase === 1 && e.world.activeBoss.hp === e.world.activeBoss.maxHp) {
         e.world.activeBoss.introPlayed = true;
         e.changeState(GAME_STATE.BOSS_INTRO);
      }
   }
}

class GameOverScene extends Scene {
   enter() { this.timer = 0; }

class GameEngine {
  constructor() {
     this.saveManager = new SaveManager();
     this.input = new InputManager();
     this.audio = new AudioEngine(this.saveManager.data);
     this.particles = new ParticleSystem(this.saveManager.data);
     this.renderer = new Renderer();
     this.ui = new UIManager();
     this.camera = new Camera();
     this.idd = new IDDSystem(this.saveManager.data.settings);
     this.world = new World();
     
     this.entities = [];
     this.player = null;

     this.state = GAME_STATE.BOOT;
     this.prevState = GAME_STATE.BOOT;
     this.bootTimer = 0;
     
     this.scenes = {};
     this.scenes[GAME_STATE.MAIN_MENU] = new MainMenuScene(this);
     this.scenes[GAME_STATE.SETTINGS] = new SettingsScene(this);
     this.scenes[GAME_STATE.CUTSCENE] = new CutsceneScene(this);
     this.scenes[GAME_STATE.GAMEPLAY] = new GameScene(this);
     this.scenes[GAME_STATE.BOSS_INTRO] = new BossIntroScene(this);
     this.scenes[GAME_STATE.GAME_OVER] = new GameOverScene(this);

     this.lastTime = 0;
     this.accumulator = 0;
     this.timestep = 1 / 60;

     // Setup start
     window.requestAnimationFrame((t) => this.loop(t));
  }

  changeState(newState) {
     this.prevState = this.state;
     
     if (this.scenes[this.prevState] && this.scenes[this.prevState].exit) {
        this.scenes[this.prevState].exit();
     }
     
     this.state = newState;
     
     // Specific transitions logic
     if(this.state === GAME_STATE.GAMEPLAY && this.prevState !== GAME_STATE.PAUSED && this.prevState !== GAME_STATE.BOSS_INTRO) {
        this._initGameplay();
     }
     if(this.state === GAME_STATE.BOSS_INTRO) {
        this.audio.sfx_bossIntro();
        this.camera.zoomTo(1.2, 1.0);
        setTimeout(() => {
           this.changeState(GAME_STATE.GAMEPLAY);
           this.camera.zoomTo(1.0, 1.0);
        }, 2500);
     }

     if (this.scenes[this.state] && this.scenes[this.state].enter) {
        this.scenes[this.state].enter();
     }
     
     this.ui.fadeAlpha = 1.0;
     this.ui.fadeTarget = 0.0;
  }

  _initGameplay() {
     this.audio.playMusicGameplay(this.saveManager.data.currentZone);
     
     // Only hard reload zone if not resuming identically, but simpler to just reload
     this.world.loadZone(this.saveManager.data.currentZone, this);
     
     // Create player
     this.player = new Player(this.saveManager.data);
     
     if(this.loadZoneMode === 'NEW') {
        this.player.x = 2 * CONSTANTS.TILE_SIZE;
        this.player.y = (this.world.height - 3) * CONSTANTS.TILE_SIZE;
     }

     this.camera.x = this.player.x - CONSTANTS.WIDTH/2;
     this.camera.y = this.player.y - CONSTANTS.HEIGHT/2;
  }

  spawnProjectile(isPlayer, x, y, vx, vy, dmg, lifetime, pierce=false) {
     this.entities.push(new Projectile(isPlayer, x, y, vx, vy, dmg, lifetime, pierce));
  }

  triggerGameOver() { this.changeState(GAME_STATE.GAME_OVER); }

  triggerUpgradeMenu() {
     // Simplified implementation for constraints
     if(this.player.coins >= 80 && !this.player.hasUpgrade('Vitality Core I')) {
         this.player.coins -= 80;
         this.player.maxHp += 30;
         this.player.hp += 30;
         this.player.upgrades.push('Vitality Core I');
         this.ui.showNotification("VITALITY CORE I PURCHASED", '#00FF00', 2.0);
     } else {
         this.ui.showNotification("UPGRADE TERMINAL: NEED 80 COINS", '#FFA500', 2.0);
     }
  }

  update(dt) {
     // Input update moved to end of loop
     
     // Boot sequence logic
     if (this.state === GAME_STATE.BOOT) {
        this.bootTimer += dt;
        if(this.bootTimer > 2.8) {
           this.audio.resume(); // Ensure context unblocked
           this.changeState(GAME_STATE.MAIN_MENU);
        }
     } 
     // Pasused logic
     else if (this.state === GAME_STATE.PAUSED) {
        if(this.input.isJustPressed('Escape') || this.input.isJustPressed('KeyP')) {
           this.changeState(GAME_STATE.GAMEPLAY);
        }
        if(this.input.isJustPressed('ArrowDown')) this.ui.pauseSelection = (this.ui.pauseSelection+1)%4;
        if(this.input.isJustPressed('ArrowUp')) this.ui.pauseSelection = (this.ui.pauseSelection-1+4)%4;
        if(this.input.isJustPressed('Enter')) {
           let action = this.ui.pauseItems[this.ui.pauseSelection];
           if(action === 'RESUME') this.changeState(GAME_STATE.GAMEPLAY);
           if(action === 'SETTINGS') this.changeState(GAME_STATE.SETTINGS);
           if(action === 'RESTART ZONE') { this.loadZoneMode='RESTART'; this.changeState(GAME_STATE.GAMEPLAY); }
           if(action === 'QUIT TO MENU') this.changeState(GAME_STATE.MAIN_MENU);
        }
     }
     else if (this.scenes[this.state] && this.scenes[this.state].update) {
         this.scenes[this.state].update(dt);
     }

     this.ui.update(dt);
     this.input.update(); // Update prev keys at end of tick
  }

  loop(timestamp) {
     if (!this.lastTime) this.lastTime = timestamp;
     let dt = (timestamp - this.lastTime) / 1000;
     if (dt > 0.1) dt = 0.1; // Clamp large deltas
     this.lastTime = timestamp;

     this.accumulator += dt;
     
     // Fixed timestep logic
     while(this.accumulator >= this.timestep) {
        this.update(this.timestep);
        this.accumulator -= this.timestep;
     }

     this.renderer.render(this);

     // Fade overlay
     if(this.ui.fadeAlpha > 0) {
        this.renderer.ctx.fillStyle = `rgba(0,0,0,${this.ui.fadeAlpha})`;
        this.renderer.ctx.fillRect(0,0,CONSTANTS.WIDTH,CONSTANTS.HEIGHT);
     }

     window.requestAnimationFrame((t) => this.loop(t));
  }
}

// Start game
window.onload = () => {
   // Resize listener
   function resizeCanvas() {
      const canvas = document.getElementById('gameCanvas');
      if(!canvas) return;
      const scaleX = window.innerWidth / 1280;
      const scaleY = window.innerHeight / 720;
      const scale = Math.min(scaleX, scaleY);
      
      canvas.style.width = (1280 * scale) + 'px';
      canvas.style.height = (720 * scale) + 'px';
      canvas.style.position = 'absolute';
      canvas.style.left = ((window.innerWidth - 1280 * scale) / 2) + 'px';
      canvas.style.top = ((window.innerHeight - 720 * scale) / 2) + 'px';
   }
   window.addEventListener('resize', resizeCanvas);
   resizeCanvas();

   // Click anywhere to unblock audio on chrome
   window.addEventListener('click', () => {
      if(window.gameEngine) window.gameEngine.audio.resume();
   });

   window.gameEngine = new GameEngine();
};


</script>
